<script>
/* Service worker kaydi - yuklenebilirlik + cevrimdisi kabuk */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function (e) { console.warn('SW kaydi basarisiz', e); });
  });
}
/* "Uygulamayi Yukle" butonu (Chrome/Edge) */
(function () {
  var deferred = null;
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault(); deferred = e; showInstallBtn();
  });
  function showInstallBtn() {
    if (document.getElementById('pwaInstallBtn')) return;
    var b = document.createElement('button');
    b.id = 'pwaInstallBtn';
    b.textContent = '⬇ Uygulamayı Yükle';
    b.style.cssText = 'position:fixed;right:16px;bottom:16px;z-index:99999;background:#f59e0b;color:#0f1117;border:none;padding:10px 16px;border-radius:10px;font-weight:700;font-family:inherit;font-size:13px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.4)';
    b.onclick = function () {
      if (!deferred) return;
      deferred.prompt();
      deferred.userChoice.then(function () { deferred = null; b.remove(); });
    };
    (document.body || document.documentElement).appendChild(b);
  }
  window.addEventListener('appinstalled', function () {
    var b = document.getElementById('pwaInstallBtn'); if (b) b.remove();
  });
})();
</script>
<style>
:root{--bg:#0f1117;--s:#1a1d27;--s2:#242836;--br:#2e3347;--t:#e8eaf0;--t2:#9198ab;--a:#f59e0b;--a2:#f97316;--g:#22c55e;--r:#ef4444;--b:#3b82f6;--p:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.app{display:flex;min-height:100vh}
.side{width:250px;background:var(--s);border-right:1px solid var(--br);position:fixed;height:100vh;overflow-y:auto;z-index:10;padding:0}
.logo-area{padding:16px;border-bottom:1px solid var(--br);text-align:center}
.logo-area img{width:120px;height:auto;margin-bottom:6px}
.logo-area p{font-size:9px;color:var(--t2);letter-spacing:1px}
.ni{padding:9px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--t2);transition:.15s;border-left:3px solid transparent}
.ni:hover{background:var(--s2);color:var(--t)}
.ni.ac{background:rgba(245,158,11,.08);color:var(--a);border-left-color:var(--a);font-weight:600}
.ns{padding:14px 16px 4px;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);font-weight:700}
.mn{margin-left:250px;flex:1;padding:20px;min-height:100vh}
.pt{font-size:20px;font-weight:700;margin-bottom:4px}
.psu{font-size:12px;color:var(--t2);margin-bottom:20px}
.cds{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.cd{background:var(--s);border:1px solid var(--br);border-radius:10px;padding:14px}
.cd .lb{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px}
.cd .vl{font-size:22px;font-weight:700;margin-top:4px}
.tw{background:var(--s);border:1px solid var(--br);border-radius:10px;overflow:hidden;margin-bottom:20px}
.th2{padding:14px 16px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.th2 h3{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:var(--s2);padding:8px 12px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);position:sticky;top:0;white-space:nowrap;z-index:2}
tbody td{padding:8px 12px;border-bottom:1px solid var(--br)}
tbody tr:hover{background:rgba(245,158,11,.04)}
.pi{background:var(--bg);border:1px solid var(--br);color:var(--a);padding:4px 7px;border-radius:5px;font-size:12px;width:90px;text-align:right;font-family:inherit;font-weight:600}
.pi:focus{outline:none;border-color:var(--a);box-shadow:0 0 0 2px rgba(245,158,11,.15)}
.ps2{width:60px;font-size:11px;padding:3px 5px}
.pg{color:var(--g)}.pb2{color:var(--b)}
.bg{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600}
.bg-a{background:rgba(245,158,11,.15);color:var(--a)}.bg-g{background:rgba(34,197,94,.15);color:var(--g)}
.bg-b{background:rgba(59,130,246,.15);color:var(--b)}.bg-p{background:rgba(139,92,246,.15);color:var(--p)}
.bg-r{background:rgba(239,68,68,.15);color:var(--r)}
select.fs{background:var(--bg);border:1px solid var(--br);color:var(--t);padding:6px 10px;border-radius:7px;font-size:12px;font-family:inherit;cursor:pointer}
.ct{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.bt{padding:7px 14px;border-radius:7px;border:1px solid var(--br);background:var(--s2);color:var(--t);font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;transition:.15s}
.bt:hover{background:var(--br)}.bt-p{background:var(--a);color:#000;border-color:var(--a);font-weight:700}
.bt-g{background:var(--g);color:#000;border-color:var(--g);font-weight:700}
.bt-r{background:var(--r);color:#fff;border-color:var(--r);font-weight:700}
.bt-b{background:var(--b);color:#fff;border-color:var(--b);font-weight:700}
.st{max-height:500px;overflow:auto}
.tbb{display:flex;gap:3px;margin-bottom:16px;background:var(--s);padding:3px;border-radius:8px;border:1px solid var(--br);flex-wrap:wrap}
.ta{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--t2);transition:.15s}
.ta:hover{color:var(--t);background:var(--s2)}.ta.ac{background:var(--a);color:#000;font-weight:700}
.pbb{display:flex;gap:14px;align-items:center;flex-wrap:wrap;background:var(--s);padding:12px 16px;border-radius:10px;border:1px solid var(--br);margin-bottom:16px}
.pbb .gr{display:flex;align-items:center;gap:5px}
.pbb label{font-size:11px;color:var(--t2);font-weight:500}
.pbb .sep{width:1px;height:24px;background:var(--br)}
.tr2 td{font-weight:700;background:rgba(245,158,11,.06)}
.ch{color:var(--a);font-weight:700}
.si{background:var(--bg);border:1px solid var(--br);color:var(--t);padding:7px 10px;border-radius:7px;font-size:12px;font-family:inherit;width:200px}
.si:focus{outline:none;border-color:var(--a)}
.ctg{display:inline-block;padding:2px 5px;border-radius:3px;font-size:9px;font-weight:600;background:var(--s2);color:var(--t2)}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.md{background:var(--s);border:1px solid var(--br);border-radius:14px;padding:24px;max-width:95vw;width:900px;max-height:85vh;overflow-y:auto}
.md h2{font-size:17px;font-weight:700;margin-bottom:14px}
.md .cl{float:right;background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;padding:4px}
.rr{display:flex;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid var(--br);flex-wrap:wrap}
.rr .nm{flex:1;min-width:140px;font-size:12px;font-weight:500}
.rr .del{color:var(--r);cursor:pointer;font-size:15px;padding:4px}
.ar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.q-form{background:var(--s);border:1px solid var(--br);border-radius:10px;padding:16px;margin-bottom:20px}
.q-form label{font-size:11px;color:var(--t2);display:block;margin-bottom:4px;font-weight:500}
.q-form input,.q-form textarea{background:var(--bg);border:1px solid var(--br);color:var(--t);padding:8px 10px;border-radius:7px;font-size:13px;font-family:inherit;width:100%;margin-bottom:12px}
.q-form input:focus,.q-form textarea:focus{outline:none;border-color:var(--a)}
.q-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.q-total{font-size:20px;font-weight:800;color:var(--a);text-align:right;padding:12px 0}
.add-product-area{background:var(--s);border:1px solid var(--br);border-radius:10px;padding:16px;margin-bottom:20px}
.add-product-area h4{font-size:13px;font-weight:600;margin-bottom:10px}
.add-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end}
.add-grid label{font-size:10px;color:var(--t2);display:block;margin-bottom:3px}
/* Quote item editable row */
.qi{display:grid;grid-template-columns:30px 1fr 100px 70px 50px 110px 30px;gap:8px;align-items:center;padding:10px 14px;background:var(--s2);border-radius:8px;margin-bottom:6px;font-size:12px}
.qi input{background:var(--bg);border:1px solid var(--br);color:var(--t);padding:4px 6px;border-radius:5px;font-size:12px;font-family:inherit}
.qi input:focus{outline:none;border-color:var(--a)}
.qi .rgt{text-align:right;font-weight:700;color:var(--a)}
.qi .rm{color:var(--r);cursor:pointer;font-size:16px;text-align:center}
.qi .rm:hover{background:rgba(239,68,68,.1);border-radius:4px}
.qi-hdr{display:grid;grid-template-columns:30px 1fr 100px 70px 50px 110px 30px;gap:8px;padding:6px 14px;font-size:10px;color:var(--t2);font-weight:600;text-transform:uppercase}
/* Preview */
.preview-frame{background:#fff;color:#1a1a1a;border-radius:8px;padding:40px;max-width:800px;margin:0 auto 20px;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.preview-frame h1{font-size:22px;color:#8b0000;text-align:center;margin:16px 0 8px}
.preview-frame .pf-line{height:2px;background:linear-gradient(90deg,#8b0000,#d4a574,#8b0000);margin:12px 0}
.preview-frame table{width:100%;border-collapse:collapse;margin:16px 0;font-size:12px}
.preview-frame th{background:#8b0000;color:#fff;padding:8px 10px;text-align:left;font-size:10px;font-weight:600}
.preview-frame td{padding:7px 10px;border-bottom:1px solid #e5e5e5}
.preview-frame tr:nth-child(even){background:#fafafa}
.preview-frame .pf-total{text-align:right;font-size:18px;font-weight:800;color:#8b0000;padding:12px 0;border-top:2px solid #8b0000}
.preview-frame .pf-info{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.preview-frame .pf-box{background:#f8f8f8;border-radius:6px;padding:12px;font-size:11px}
.preview-frame .pf-box strong{display:block;font-size:9px;text-transform:uppercase;color:#888;margin-bottom:4px;letter-spacing:1px}
.preview-frame .pf-footer{text-align:center;font-size:9px;color:#999;margin-top:20px;padding-top:12px;border-top:1px solid #e5e5e5}
@media(max-width:900px){.side{display:none}.mn{margin-left:0}.q-grid{grid-template-columns:1fr}.add-grid{grid-template-columns:1fr 1fr}.qi{grid-template-columns:20px 1fr 80px 60px 40px 90px 24px;font-size:11px}}
</style>
</head>

function oNT(){
  var name=cleanName(prompt('Yeni tekstil modeli adı:')||'');
  if(!name||!name.trim())return;
  name=name.trim();
  if(S.tr[name]){alert('Bu isimde model zaten var!');return;}
  if(!S.trMeta) S.trMeta={};
  S.tr[name]=[];
  S.trMeta[name]={type:'tek'};
  S.sel.tekstil=name;
  autoSave();R();
}

function delTModel(model){
  if(!confirm(model+' modelini silmek istediğinize emin misiniz?'))return;
  delete S.tr[model];
  if(S.trMeta) delete S.trMeta[model];
  if(S.tgm) delete S.tgm[model];
  delete S.mpr[model];
  S.sel.tekstil=Object.keys(S.tr)[0]||null;
  autoSave();R();
}

  if(!S.tr[model])return;
  var mats=D.materials.map(function(m){return m.p;});
  // Ek hammadde seçenekleri (tekstile özgü)
  var extra=['POLYESTER KUMAŞ','PAMUKLU KUMAŞ','MİKROFİBER KUMAŞ','SAFİR KUMAŞ','BARIYER KUMAŞ','TERMİK YÜZEY','ELASTİK ŞERİT','FERMELİ','ETİKET','AMBALAJ'];
  mats=mats.concat(extra.filter(function(e){return mats.indexOf(e)<0;}));

  var opts=mats.map(function(p){return '<option value="'+p+'">'+p+'</option>';}).join('');

function addTItem(model){
  var p=document.getElementById('te-mat').value;
  var custom=cleanName(document.getElementById('te-custom').value||'');
  if(custom) p=custom.toUpperCase();
  if(!p) return;
  var u=document.getElementById('te-unit').value||'METRE';
  var qty=parseFloat(document.getElementById('te-qty').value)||1;
  var up=parseFloat(document.getElementById('te-up').value);
  var mat=D.materials.find(function(m){return m.p===p;});
  if(!isFinite(up)) up=S.mp[p]||(mat?mat.pr:0);
  S.tr[model].push({p:p,u:u,qty:qty,up:up,co:up*qty});
  autoSave();R();
  document.getElementById('t-editor-overlay')&&document.getElementById('t-editor-overlay').remove();
}

      if(ov==null || nv==null) return;

      if(!isFinite(ov)||!isFinite(nv)||ov===nv) return;
      var pct=ov===0 ? 100000 : Math.abs(nv-ov)/Math.abs(ov)*100;
      changes.push({k:k,p:pct});
    });
  }
  changes.sort(function(a,b){return b.p-a.p;});

    at:new Date().toISOString(),

    what: top.length ? ('Fiyat güncellemesi: '+top.join(', ')) : 'Genel veri güncellemesi',
    mode: MANUAL_EDIT ? 'manuel' : 'otomatik'
  };
}

function validateState(){
  function isNum(v){ return typeof v==='number' ? isFinite(v) : (v!=null && isFinite(parseFloat(v))); }
  function bad(msg){
    toast('⚠️ '+msg, 'err', 7000);
    return false;
  }

  // Hammadde fiyatları
  D.materials.forEach(function(m){
    var v = S.mp[m.p];
    if(v==null || !isNum(v)) throw new Error('Hammadde fiyatı geçersiz: '+m.p);
    if(v < 0) throw new Error('Hammadde fiyatı negatif: '+m.p);
  });

  // Overhead / işçilik (genelde % ve negatif olmamalı)
  ['gu','an','fn','am','sn','fr'].forEach(function(k){
    if(!isNum(S.oh[k]) || S.oh[k] < 0) throw new Error('Genel gider oranı negatif: '+k);
  });
  ['gu','an','fn','am','sn','fr'].forEach(function(k){
    if(!isNum(S.koh[k]) || S.koh[k] < 0) throw new Error('Kanepe gider oranı negatif: '+k);
  });
  if(!isNum(S.koh.is_sabit) || S.koh.is_sabit < 0) throw new Error('Kanepe sabit işçilik negatif');

  // Sized reçeteler (yatak/başlık/baza + özel gruplar)
  function validateSized(recs, grp){
    if(!recs) return true;
    Object.keys(recs).forEach(function(model){
      var arr=recs[model];
      // Yeni model eklenip henüz kalem girilmediyse kaydı engelleme.
      if(!Array.isArray(arr) || arr.length===0) return;
      arr.forEach(function(it){
        // Eksik satırları kaydı bloklamadan atla.
        if(!it || !it.p) return;
        if(it.up!=null && (!isNum(it.up) || it.up < 0)) throw new Error('Geçersiz birim fiyat: '+grp+' / '+model+' / '+it.p);
        if(it.q!=null && typeof it.q!=='object') throw new Error('Geçersiz ölçü objesi: '+grp+' / '+model+' / '+it.p);
        if(it.q && typeof it.q==='object'){
          var keys = Object.keys(it.q);
          // Kullanıcı düzenlerken yeni kalemi ekleyip henüz ölçü değerlerini girmediyse (q={} gibi)
          // kaydı engellemesin diye: q objesinde anahtar yoksa kontrol atla.
          if(keys.length > 0){
            var sum=0;
            keys.forEach(function(sz){
              var q=it.q[sz];
              if(!isNum(q) || q < 0) throw new Error('Negatif/Geçersiz miktar: '+grp+' / '+model+' / '+it.p+' / '+sz);
              sum += parseFloat(q);
            });
            if(sum<=0) throw new Error('Reçete kalemi boş miktar: '+grp+' / '+model+' / '+it.p);
          }
        }
      });
    });
  }

  validateSized(S.yr,'yatak');
  validateSized(S.br,'baslik');
  validateSized(S.bzr,'baza');
  if(S.xg){
    Object.keys(S.xg).forEach(function(g){
      validateSized(S.xg[g], g);
    });
  }

  // Kanepe reçeteleri (model -> {p,up,qty})
  function validateK(recs){
    if(!recs) return true;
    Object.keys(recs).forEach(function(model){
      var arr=recs[model];
      // Yeni model eklenip henüz içerik girilmediyse kaydı engelleme.
      if(!Array.isArray(arr) || arr.length===0) return;
      arr.forEach(function(it){
        if(!it || !it.p) return;
        // Kullanıcı giriş sırasında 0/boş bırakabilir; kritik değilse kaydı engelleme.
        if(it.qty!=null && (!isNum(it.qty) || it.qty < 0)) throw new Error('Negatif/Geçersiz miktar: kanepe / '+model+' / '+it.p);
        if(it.up!=null && (!isNum(it.up) || it.up < 0)) throw new Error('Geçersiz birim fiyat: kanepe / '+model+' / '+it.p);
      });
    });
  }
  validateK(S.kr);

  // Tekstil reçeteleri
  function validateT(){
    if(!S.tr) return true;
    Object.keys(S.tr).forEach(function(model){
      var arr=S.tr[model];
      // Yeni model eklenip henüz içerik girilmediyse kaydı engelleme.
      if(!Array.isArray(arr) || arr.length===0) return;
      arr.forEach(function(it){
        if(!it || !it.p) return;
        if(it.qty!=null && (!isNum(it.qty) || it.qty < 0)) throw new Error('Negatif/Geçersiz miktar: tekstil / '+model+' / '+it.p);
        if(it.up!=null && (!isNum(it.up) || it.up < 0)) throw new Error('Geçersiz birim fiyat: tekstil / '+model+' / '+it.p);
      });
    });
  }
  validateT();
  if(S.tgm && typeof S.tgm==='object'){
    Object.keys(S.tgm).forEach(function(model){
      var v=S.tgm[model];
      if(v==null) return;
      if(!isNum(v) || parseFloat(v)<0) throw new Error('Geçersiz tekstil genel maliyet: '+model);
    });
  }
  if(S.kgm && typeof S.kgm==='object'){
    Object.keys(S.kgm).forEach(function(model){
      var v=S.kgm[model];
      if(v==null) return;
      if(!isNum(v) || parseFloat(v)<0) throw new Error('Geçersiz kanepe genel maliyet: '+model);
    });
  }
  if(S.sgm && typeof S.sgm==='object'){
    Object.keys(S.sgm).forEach(function(grp){
      var gm=S.sgm[grp]||{};
      Object.keys(gm).forEach(function(model){
        var szObj=gm[model]||{};
        Object.keys(szObj).forEach(function(sz){
          var v=szObj[sz];
          if(v==null) return;
          if(!isNum(v) || parseFloat(v)<0) throw new Error('Geçersiz genel maliyet: '+grp+' / '+model+' / '+sz);
        });
      });
    });
  }

  return true;
}

function checkPriceWarning(){
  if(!LAST_MP_VALUES) return true;
  var worstKey='', maxPct=0;
  Object.keys(LAST_MP_VALUES).forEach(function(k){
    if(S.mp[k]==null) return;
    var oldV=LAST_MP_VALUES[k], newV=S.mp[k];
    if(!isFinite(parseFloat(oldV)) || !isFinite(parseFloat(newV))) return;
    oldV=parseFloat(oldV); newV=parseFloat(newV);
    var pct;
    if(oldV===0){
      pct = (newV===0) ? 0 : 100000;
    } else {
      pct = Math.abs(newV-oldV)/Math.abs(oldV)*100;
    }
    if(pct>maxPct){
      maxPct=pct;
      worstKey=k;
    }
  });
  if(maxPct>=WARN_PCT){
    return confirm('⚠️ Fiyat değişim eşiği aşıldı.\\nEn fazla değişim: '+worstKey+' (%'+maxPct.toFixed(1)+')\\nKaydetmek istiyor musunuz?');
  }
  return true;
}

    return {ok:false, ts:0};
  }
}

function fbAuthQuery(){
  return FB_ID_TOKEN ? ('?auth=' + encodeURIComponent(FB_ID_TOKEN)) : '';
}
function signInFirebase(email, password){
  var em=String(email||'').trim();
  var pw=String(password||'');
  if(!em || !pw) return Promise.reject(new Error('Email ve sifre gerekli'));
  if(!FB_API_KEY || FB_API_KEY.indexOf('REPLACE_')===0){
    return Promise.reject(new Error('FB_API_KEY ayarlanmamis'));
  }
  return fetch('https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key='+encodeURIComponent(FB_API_KEY),{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email:em,password:pw,returnSecureToken:true})
  }).then(function(r){
    return r.json().then(function(d){ return {ok:r.ok,data:d}; });
  }).then(function(res){
    if(!res.ok){
      var msg=(res.data && res.data.error && res.data.error.message) ? res.data.error.message : 'Giris basarisiz';
      throw new Error(msg);
    }
    FB_ID_TOKEN = res.data.idToken || '';
    FB_REFRESH_TOKEN = res.data.refreshToken || '';
    if(!FB_ID_TOKEN) throw new Error('Token alinamadi');
    saveAuth();
    return true;
  });
}

// Firebase'den yükle — tüm veriyi S üzerine uygula
// Firebase array'leri {0:x, 1:y} objesine çevirebilir — toArr ile düzelt
function toArr(v){
  if(Array.isArray(v)) return v.filter(function(x){return x!=null;});
  if(v && typeof v==='object'){
    var keys=Object.keys(v);
    var isNumeric=keys.length>0 && keys.every(function(k){return /^\d+$/.test(k);});
    if(isNumeric){
      var arr=[];
      keys.forEach(function(k){if(v[k]!=null) arr.push(v[k]);});
      return arr;
    }
  }
  return [];
}

function applyServerData(data){
  if(!data || typeof data!=='object') return false;

    // Hammadde fiyatları (array format: [{p:name, v:price}] veya eski object format)
    if(data.mp){
      var mpList = toArr(data.mp);
      if(mpList.length > 0){
        mpList.forEach(function(item){ if(item && item.p) S.mp[item.p] = item.v; });
      } else if(typeof data.mp === 'object'){
        // Eski object format (backward compat)
        Object.keys(data.mp).forEach(function(k){ S.mp[k] = data.mp[k]; });
      }
    }
    // Kâr oranları (grup)
    if(data.pr){
      Object.keys(data.pr).forEach(function(k){ S.pr[k] = data.pr[k]; });
    }
    // Model bazlı kâr oranları (decode keys)
    if(data.mpr){
      Object.keys(data.mpr).forEach(function(k){ S.mpr[fbDec(k)] = data.mpr[k]; });
    }
    // KDV
    if(data.kdv != null) S.kdv = data.kdv;
    // Genel gider oranları
    if(data.oh){
      ['gu','an','fn','am','sn','fr'].forEach(function(k){ if(data.oh[k]!=null) S.oh[k]=data.oh[k]; });
      if(data.oh.extra) S.oh.extra = toArr(data.oh.extra);
    }
    // Kanepe gider oranları
    if(data.koh){
      ['gu','an','fn','am','sn','fr'].forEach(function(k){ if(data.koh[k]!=null) S.koh[k]=data.koh[k]; });
      if(data.koh.isSabit!=null) S.koh.is_sabit=data.koh.isSabit;
      if(data.koh.is_sabit!=null) S.koh.is_sabit=data.koh.is_sabit;
    }
    // İşçilik oranları (decode keys)
    if(data.isc){
      Object.keys(data.isc).forEach(function(grp){
        var realGrp = fbDec(grp);
        if(!S.isc[realGrp]) S.isc[realGrp]={};
        if(data.isc[grp] && typeof data.isc[grp]==='object'){
          Object.keys(data.isc[grp]).forEach(function(m){ S.isc[realGrp][fbDec(m)]=data.isc[grp][m]; });
        }
      });
    }
    // Tekstil reçeteleri (decode keys + array fix)
    if(data.tr){
      S.tr = {};
      Object.keys(data.tr).forEach(function(k){
        S.tr[fbDec(k)] = toArr(data.tr[k]);
      });
    }
    if(data.trm && typeof data.trm==='object'){
      S.trMeta = {};
      Object.keys(data.trm).forEach(function(k){
        var mk=fbDec(k);
        var mv=data.trm[k]||{};
        S.trMeta[mk]={type:tTypeKey(mv.type)};
      });
    }
    if(data.tgm && typeof data.tgm==='object'){
      S.tgm = {};
      Object.keys(data.tgm).forEach(function(k){
        var mk=fbDec(k);
        var v=parseFloat(data.tgm[k]);
        if(isFinite(v) && v>=0) S.tgm[mk]=v;
      });
    }
    if(data.kgm && typeof data.kgm==='object'){
      S.kgm = {};
      Object.keys(data.kgm).forEach(function(k){
        var mk=fbDec(k);
        var v=parseFloat(data.kgm[k]);
        if(isFinite(v) && v>=0) S.kgm[mk]=v;
      });
    }
    if(data.sgm && typeof data.sgm==='object'){
      S.sgm = {};
      Object.keys(data.sgm).forEach(function(g){
        var realGrp=fbDec(g);
        S.sgm[realGrp]={};
        var gmByModel=data.sgm[g]||{};
        Object.keys(gmByModel).forEach(function(mk){
          var realModel=fbDec(mk);
          var bySize=gmByModel[mk]||{};
          S.sgm[realGrp][realModel]={};
          Object.keys(bySize).forEach(function(sz){
            var v=parseFloat(bySize[sz]);
            if(isFinite(v) && v>=0) S.sgm[realGrp][realModel][sz]=v;
          });
        });
      });
    }
    if(data.tpr != null) S.pr.tekstil = data.tpr;
    if(data.alog) S.audit = toArr(data.alog);
    if(data.xmeta && typeof data.xmeta==='object'){
      S.xmeta={};
      Object.keys(data.xmeta).forEach(function(k){ S.xmeta[fbDec(k)] = data.xmeta[k]; });
    }
    if(data.xpr && typeof data.xpr==='object'){
      Object.keys(data.xpr).forEach(function(k){ S.pr[fbDec(k)] = data.xpr[k]; });
    }

    // Yatak reçeteleri (decode keys + array fix)
    if(data.yr && typeof data.yr === 'object' && Object.keys(data.yr).length > 0){
      S.yr = {};
      Object.keys(data.yr).forEach(function(k){
        var items = toArr(data.yr[k]);
        // Her item'ın q ve co'sunu da kontrol et (Firebase nested objeye çevirebilir)
        S.yr[fbDec(k)] = items.map(function(it){
          if(!it) return it;
          // q objesi korunmalı (key'ler "90x190" gibi, yasak karakter yok)
          return it;
        });
      });
      console.log('Yatak modelleri yüklendi:', Object.keys(S.yr).length);
    }
    // Başlık reçeteleri (decode keys + array fix)
    if(data.brr && typeof data.brr === 'object' && Object.keys(data.brr).length > 0){
      S.br = {};
      Object.keys(data.brr).forEach(function(k){
        S.br[fbDec(k)] = toArr(data.brr[k]);
      });
      console.log('Başlık modelleri yüklendi:', Object.keys(S.br).length);
    }
    // Baza reçeteleri (decode keys + array fix)
    if(data.bzrr && typeof data.bzrr === 'object' && Object.keys(data.bzrr).length > 0){
      S.bzr = {};
      Object.keys(data.bzrr).forEach(function(k){
        S.bzr[fbDec(k)] = toArr(data.bzrr[k]);
      });
      console.log('Baza modelleri yüklendi:', Object.keys(S.bzr).length);
    }
    // Kanepe reçeteleri (decode keys + array fix)
    if(data.krr && typeof data.krr === 'object' && Object.keys(data.krr).length > 0){
      S.kr = {};
      Object.keys(data.krr).forEach(function(k){
        S.kr[fbDec(k)] = toArr(data.krr[k]);
      });
      console.log('Kanepe modelleri yüklendi:', Object.keys(S.kr).length);
    }
    if(data.xgr && typeof data.xgr==='object'){
      S.xg={};
      Object.keys(data.xgr).forEach(function(g){
        var gk=fbDec(g);
        S.xg[gk]={};
        if(data.xgr[g] && typeof data.xgr[g]==='object'){
          Object.keys(data.xgr[g]).forEach(function(m){
            S.xg[gk][fbDec(m)] = toArr(data.xgr[g][m]);
          });
        }
      });
    }
    // Hammadde listesi (yeni eklenmiş materyaller + array fix)
    if(data.mats){
      var matsList = toArr(data.mats);
      if(matsList.length > 0){
        // Firebase'deki listeyi D.materials ile birleştir
        var existingNames = {};
        matsList.forEach(function(m){ if(m && m.p) existingNames[m.p]=true; });
        // D'de olup firebase'de olmayanları ekle
        D.materials.forEach(function(m){
          if(!existingNames[m.p]){
            matsList.push({p:m.p, pr:m.pr, u:m.u||'', c:m.c||'', a:m.a||''});
          }
        });
        D.materials = matsList;
        // mp'yi güncelle
        D.materials.forEach(function(m){
          if(S.mp[m.p] === undefined) S.mp[m.p] = m.pr;
        });
        console.log('Hammadde listesi yüklendi:', D.materials.length);
      }
    }

  return true;
}

// ====== CANLI SENKRONIZASYON (real-time) ======
var FB_STREAM = null;
var LIVE_REFRESH_TIMER = null;
var LIVE_DEBOUNCE = null;

function isEditingNow(){
  var a = document.activeElement;
  if(!a) return false;
  var tag = a.tagName;
  return tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT';
}

function refreshIdToken(){
  if(!FB_REFRESH_TOKEN) return Promise.reject(new Error('refresh token yok'));
  if(!FB_API_KEY) return Promise.reject(new Error('api key yok'));
  return fetch('https://securetoken.googleapis.com/v1/token?key='+encodeURIComponent(FB_API_KEY),{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'grant_type=refresh_token&refresh_token='+encodeURIComponent(FB_REFRESH_TOKEN)
  }).then(function(r){ return r.json(); }).then(function(d){
    if(d && d.id_token){
      FB_ID_TOKEN = d.id_token;
      if(d.refresh_token) FB_REFRESH_TOKEN = d.refresh_token;
      saveAuth();
      return true;
    }
    throw new Error('token yenilenemedi');
  });
}

// Akistan haber gelince tum veriyi yeniden cek ve uygula (sade ve guvenli)
function liveRefetch(){
  // Yerelde kaydedilmemis degisiklik VEYA aktif duzenleme varsa: sunucu verisini uygulama,
  // kullanicinin isini ezmeyelim. Biraz sonra tekrar dene.
  if(MANUAL_EDIT || SAVE_PENDING || isEditingNow()){
    clearTimeout(LIVE_DEBOUNCE);
    LIVE_DEBOUNCE = setTimeout(liveRefetch, 1500);
    return;
  }
  fbGet().then(function(data){
    if(!data || typeof data!=='object') return;
    // Yeniden kontrol: fetch donerken kullanici yazmaya baslamis olabilir
    if(MANUAL_EDIT || SAVE_PENDING || isEditingNow()){
      clearTimeout(LIVE_DEBOUNCE);
      LIVE_DEBOUNCE = setTimeout(liveRefetch, 1500);
      return;
    }
    applyServerData(data);
    LAST_MP_VALUES = snapshotMP();
    saveLocalBackup({S:S,materials:D.materials,at:new Date().toISOString()});
    rXNav();
    R();
    setSyncStatus('\ud83d\udd04 Canli guncellendi ('+(new Date()).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})+')','ok');
  }).catch(function(e){ console.warn('liveRefetch hata', e); });
}

function onStreamEvent(){
  clearTimeout(LIVE_DEBOUNCE);
  LIVE_DEBOUNCE = setTimeout(liveRefetch, 400); // patlama halinde olaylari birlestir
}

function startLiveSync(){
  if(typeof EventSource==='undefined'){ console.warn('EventSource yok, canli sync kapali'); return; }
  try{ if(FB_STREAM) FB_STREAM.close(); }catch(e){}
  var url = FB_URL + '.json' + (FB_ID_TOKEN ? ('?auth='+encodeURIComponent(FB_ID_TOKEN)) : '');
  var es;
  try{ es = new EventSource(url); }catch(e){ console.warn('EventSource acilamadi', e); return; }
  FB_STREAM = es;
  es.addEventListener('put', onStreamEvent);
  es.addEventListener('patch', onStreamEvent);
  es.onopen = function(){ setSyncStatus('\ud83d\udfe2 Canli baglandi','ok'); };
  es.onerror = function(){
    // Baglanti koptu (cogu zaman token suresi doldu). Token yenile + yeniden baglan.
    try{ es.close(); }catch(e){}
    FB_STREAM = null;
    setSyncStatus('Canli baglanti yenileniyor...','saving');
    refreshIdToken().then(function(){ setTimeout(startLiveSync, 1000); })
                    .catch(function(){ setTimeout(startLiveSync, 5000); });
  };
  // Token suresi ~1 saat: 50 dakikada bir proaktif yenile + yeniden baglan
  clearTimeout(LIVE_REFRESH_TIMER);
  LIVE_REFRESH_TIMER = setTimeout(function(){
    refreshIdToken().then(function(){ startLiveSync(); }).catch(function(){ startLiveSync(); });
  }, 50*60*1000);
}

// Firebase key encoder/decoder — Firebase key'lerde . $ # [ ] / yasak
function fbEnc(k){ return String(k).replace(/[.#$/\[\]]/g, function(c){ return '_' + c.charCodeAt(0).toString(16) + '_'; }); }
function fbDec(k){ return String(k).replace(/_([0-9a-f]{2})_/gi, function(m, hex){ return String.fromCharCode(parseInt(hex, 16)); }); }

// Firebase'e kaydet
function saveToFirebase(){
  if(!FB_READY || SAVE_PENDING) return;
  SAVE_PENDING = true;
  toast('💾 Kaydediliyor...', 'saving', 60000);
  setSyncStatus('Buluta yazılıyor...','saving');

  // 1) Veri doğrulama: hatalı reçete/fiyat kaydı engellensin
  try{
    validateState();
  }catch(ve){
    SAVE_PENDING = false;
    var vmsg = (ve && ve.message ? ve.message : String(ve||'Bilinmeyen doğrulama hatası'));
    setSyncStatus('Doğrulama hatası: '+vmsg.substring(0,90),'err');
    toast('⚠️ '+vmsg, 'err', 8000);
    MANUAL_EDIT = false;
    return;
  }

  // 2) Fiyat eşiği: kullanıcıdan onay iste
  if(MANUAL_EDIT && !BEFORE_UNLOAD){
    var ok = checkPriceWarning();
    if(!ok){
      SAVE_PENDING = false;
      setSyncStatus('Kaydetme iptal edildi','err');
      toast('Kaydetme iptal edildi', 'err', 3500);
      MANUAL_EDIT = false;
      return;
    }
  }

  // Firebase kuralları: boş string key yasak, null/undefined/NaN yasak, _ ile başlayan key yasak
  function safeN(v){ var n=parseFloat(v); return isFinite(n)?n:0; }
  function validKey(k){ return k && k.trim()!=='' && k.charAt(0)!=='.'; }

  // Model kar oranları
  var mprClean = {};
  Object.keys(S.mpr||{}).forEach(function(k){
    if(!validKey(k)) return;
    if(S.mpr[k]!==undefined && S.mpr[k]!==null) mprClean[fbEnc(k)] = safeN(S.mpr[k]);
  });

  // Işçilik - _default ve _ ile başlayan keyler çıkar
  var iscClean = {};
  Object.keys(S.isc||{}).forEach(function(grp){
    if(!validKey(grp) || grp.charAt(0)==='_') return;
    var src = S.isc[grp];
    if(!src || typeof src !== 'object') return;
    var g = {};
    Object.keys(src).forEach(function(k){
      if(!validKey(k) || k.charAt(0)==='_') return;
      g[fbEnc(k)] = safeN(src[k]);
    });
    if(Object.keys(g).length > 0) iscClean[fbEnc(grp)] = g;
  });

  // Tekstil reçeteleri
  var trClean = {};
  Object.keys(S.tr||{}).forEach(function(modelKey){
    if(!validKey(modelKey)) return;
    var items = S.tr[modelKey];
    if(!Array.isArray(items)) return;
    trClean[fbEnc(modelKey)] = items.filter(function(it){ return it && validKey(it.p); });
  });
  var trMetaClean = {};
  Object.keys(S.trMeta||{}).forEach(function(modelKey){
    if(!validKey(modelKey)) return;
    var tm=S.trMeta[modelKey]||{};
    trMetaClean[fbEnc(modelKey)]={type:tTypeKey(tm.type)};
  });
  var tgmClean = {};
  Object.keys(S.tgm||{}).forEach(function(modelKey){
    if(!validKey(modelKey)) return;
    var v=parseFloat(S.tgm[modelKey]);
    if(isFinite(v) && v>=0) tgmClean[fbEnc(modelKey)]=v;
  });
  var kgmClean = {};
  Object.keys(S.kgm||{}).forEach(function(modelKey){
    if(!validKey(modelKey)) return;
    var v=parseFloat(S.kgm[modelKey]);
    if(isFinite(v) && v>=0) kgmClean[fbEnc(modelKey)]=v;
  });
  var sgmClean = {};
  Object.keys(S.sgm||{}).forEach(function(grp){
    if(!validKey(grp)) return;
    var gmByModel=S.sgm[grp]||{};
    var go={};
    Object.keys(gmByModel).forEach(function(modelKey){
      if(!validKey(modelKey)) return;
      var bySize=gmByModel[modelKey]||{};
      var so={};
      Object.keys(bySize).forEach(function(sz){
        var v=parseFloat(bySize[sz]);
        if(isFinite(v) && v>=0) so[sz]=v;
      });
      if(Object.keys(so).length) go[fbEnc(modelKey)]=so;
    });
    if(Object.keys(go).length) sgmClean[fbEnc(grp)]=go;
  });

  // Tüm hammadde fiyatları — ARRAY olarak kaydet (key'lerde / # . vb. yasak)
  var mpArr = [];
  D.materials.forEach(function(m){
    if(!m.p || !m.p.trim()) return;
    mpArr.push({p: m.p, v: safeN(S.mp[m.p] !== undefined ? S.mp[m.p] : m.pr)});
  });
  Object.keys(S.mp||{}).forEach(function(k){
    if(!k || !k.trim()) return;
    var exists = mpArr.some(function(x){ return x.p===k; });
    if(!exists) mpArr.push({p: k, v: safeN(S.mp[k])});
  });

  // Yeni eklenen hammaddeler (D'de olmayan)
  var newMats = [];
  D.materials.forEach(function(m){
    // Sadece orijinal D listesindeki materyalleri kaydet
    newMats.push({p:m.p, pr:safeN(m.pr), u:m.u||'', c:m.c||'', a:m.a||''});
  });

  // Yatak/Başlık/Baza reçeteleri (tam kaydet)
  function cleanSizedRecipes(recs){
    if(!recs) return {};
    var out={};
    Object.keys(recs).forEach(function(model){
      if(!validKey(model)) return;
      var items=recs[model];
      if(!Array.isArray(items)) return;
      out[fbEnc(model)]=items.map(function(it){
        var ci={p:it.p||'',u:it.u||'',up:safeN(it.up),c:it.c||''};
        if(it.q && typeof it.q==='object'){ci.q={};Object.keys(it.q).forEach(function(sz){ci.q[sz]=safeN(it.q[sz])});}
        if(it.co && typeof it.co==='object'){ci.co={};Object.keys(it.co).forEach(function(sz){ci.co[sz]=safeN(it.co[sz])});}
        return ci;
      });
    });
    return out;
  }

  // Kanepe reçeteleri (tam kaydet)
  function cleanKRecipes(recs){
    if(!recs) return {};
    var out={};
    Object.keys(recs).forEach(function(model){
      if(!validKey(model)) return;
      var items=recs[model];
      if(!Array.isArray(items)) return;
      out[fbEnc(model)]=items.map(function(it){
        return {p:it.p||'',up:safeN(it.up),qty:safeN(it.qty),co:safeN(it.co)};
      });
    });
    return out;
  }

  // Özel ana gruplar
  var xgrClean={};
  Object.keys(S.xg||{}).forEach(function(grp){
    if(!validKey(grp)) return;
    xgrClean[fbEnc(grp)] = cleanSizedRecipes(S.xg[grp]);
  });
  var xprClean={};
  Object.keys(S.xg||{}).forEach(function(grp){
    if(!validKey(grp)) return;
    xprClean[fbEnc(grp)] = safeN(S.pr[grp]||20);
  });
  var xmetaClean={};
  Object.keys(S.xmeta||{}).forEach(function(grp){
    if(!validKey(grp)) return;
    var m=S.xmeta[grp]||{};
    xmetaClean[fbEnc(grp)]={name:cleanName(m.name||grp),icon:cleanName(m.icon||'🧩')};
  });
  var auditLog = Array.isArray(S.audit) ? S.audit.slice(-199) : [];
  var auditEntry = buildAuditEntry();
  if(auditEntry) auditLog.push(auditEntry);
  S.audit = auditLog;

  var payload = {
    mp:  mpArr,
    pr:  { yatak:safeN(S.pr.yatak), baslik:safeN(S.pr.baslik), baza:safeN(S.pr.baza), kanepe:safeN(S.pr.kanepe), tekstil:safeN(S.pr.tekstil) },
    mpr: mprClean,
    kdv: safeN(S.kdv),
    oh:  { gu:safeN(S.oh.gu), an:safeN(S.oh.an), fn:safeN(S.oh.fn), am:safeN(S.oh.am), sn:safeN(S.oh.sn), fr:safeN(S.oh.fr) },
    koh: { gu:safeN(S.koh.gu), an:safeN(S.koh.an), fn:safeN(S.koh.fn), am:safeN(S.koh.am), sn:safeN(S.koh.sn), fr:safeN(S.koh.fr), isSabit:safeN(S.koh.is_sabit) },
    isc: iscClean,
    tr:  trClean,
    trm: trMetaClean,
    tgm: tgmClean,
    kgm: kgmClean,
    sgm: sgmClean,
    xgr: xgrClean,
    xpr: xprClean,
    xmeta: xmetaClean,
    alog: auditLog,
    yr:  cleanSizedRecipes(S.yr),
    brr: cleanSizedRecipes(S.br),
    bzrr:cleanSizedRecipes(S.bzr),
    krr: cleanKRecipes(S.kr),
    mats:newMats,
    at:  new Date().toISOString()
  };

  var bodyStr;
  try {
    bodyStr = JSON.stringify(payload);
    console.log('Firebase kayıt boyutu:', (bodyStr.length/1024).toFixed(1)+'KB, key sayıları — yr:'+Object.keys(payload.yr||{}).length+' brr:'+Object.keys(payload.brr||{}).length+' bzrr:'+Object.keys(payload.bzrr||{}).length+' krr:'+Object.keys(payload.krr||{}).length+' mp:'+((payload.mp||[]).length)+' mats:'+((payload.mats||[]).length)+' tr:'+Object.keys(payload.tr||{}).length);
  } catch(je){
    SAVE_PENDING = false;
    toast('\u274C JSON hatası: '+je.message, 'err', 5000);
    console.error('JSON stringify hatası:', je);
    return;
  }

  // Firebase key doğrulama — yasak karakterleri bul ve düzelt
  function sanitizeKeys(obj, path){
    if(obj===null || obj===undefined || typeof obj!=='object') return obj;
    if(Array.isArray(obj)) return obj.map(function(item,i){return sanitizeKeys(item, path+'['+i+']');});
    var out={};
    Object.keys(obj).forEach(function(k){
      var bad=/[.#$/\[\]]/.test(k);
      var empty=!k || k.trim()==='';
      if(empty){
        console.warn('Firebase: boş key atlandı, path='+path);
        return;
      }
      var safeKey=bad?fbEnc(k):k;
      if(bad) console.warn('Firebase: yasak key düzeltildi: "'+k+'" → "'+safeKey+'" path='+path);
      out[safeKey]=sanitizeKeys(obj[k], path+'.'+safeKey);
    });
    return out;
  }
  var safePayload=sanitizeKeys(payload,'root');
  bodyStr=JSON.stringify(safePayload);
  saveLocalBackup({S:S,materials:D.materials,at:new Date().toISOString()});

  if(bodyStr===LAST_SAVED_HASH){
    SAVE_PENDING = false;
    return;
  }
  var pendingHash = bodyStr;

  fetch(FB_URL + '.json' + fbAuthQuery(), {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: bodyStr
  }).then(function(r){
    SAVE_PENDING = false;
    if(r.ok){
      LAST_SAVED_HASH = pendingHash;
      FB_WRITE_OK = true;
      LAST_MP_VALUES = snapshotMP();
      MANUAL_EDIT = false;
      saveLocalRevision('save-ok');
      setSyncStatus('✅ Buluta kaydedildi ('+(new Date()).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})+')','ok');
      toast('\u2705 Kaydedildi', 'ok', 2500);
    } else {
      r.text().then(function(t){
        FB_WRITE_OK = false;
        MANUAL_EDIT = false;
        setSyncStatus('Firebase hatası — yerelde kaldı','err');
        toast('\u274C Firebase: '+t.substring(0,120), 'err', 8000);
        console.error('Firebase PATCH error', r.status, t);
      });
    }
  }).catch(function(e){
    SAVE_PENDING = false;
    FB_WRITE_OK = false;
    MANUAL_EDIT = false;
    setSyncStatus('Ağ hatası — yerelde kaldı','err');
    toast('\u274C Ag hatasi: '+e.message, 'err', 5000);
  });
}

// Debounced otomatik kayıt — son değişiklikten 2 saniye sonra
function autoSave(){
  clearTimeout(AUTO_SAVE_TIMER);
  AUTO_SAVE_TIMER = setTimeout(saveToFirebase, 2000);
}

// Tüm input değişikliklerini dinle
document.addEventListener('change', function(e){
  var t = e.target;
  // Fiyat inputları, select'ler (kâr oranı, KDV vs.) değişince kaydet
  if(t.classList.contains('pi') || t.classList.contains('fs') || t.classList.contains('si')){
    MANUAL_EDIT = true;
    setSyncStatus('Değişiklik işlendi, kaydediliyor...','saving');
    saveLocalBackup({S:S,materials:D.materials,at:new Date().toISOString()});
    if(!FB_READY) return;
    autoSave();
  }
});
document.addEventListener('input', function(e){
  var t=e.target;
  if(t.classList.contains('pi') || t.classList.contains('si')){
    // Blur beklemeden yenilemede veri kaybını önler
    MANUAL_EDIT = true;
    setSyncStatus('Değişiklik işlendi...','saving');
    saveLocalBackup({S:S,materials:D.materials,at:new Date().toISOString()});
  }
});

// Periyodik kayıt — 60 saniyede bir (ekstra güvenlik)
setInterval(function(){ if(FB_READY) saveToFirebase(); }, 60000);

// Sayfa kapanırken kaydet
window.addEventListener('beforeunload', function(){
  BEFORE_UNLOAD = true;
  saveLocalBackup({S:S,materials:D.materials,at:new Date().toISOString()});
  if(AUTO_SAVE_TIMER) clearTimeout(AUTO_SAVE_TIMER);
  if(FB_READY) saveToFirebase();
});

// ========== BAŞLAT ==========
document.body.insertAdjacentHTML('beforeend',
  '<div id="auth-gate" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:700;align-items:center;justify-content:center"></div>' +
  '<div id="fb-loading" style="display:none">' +
    '<div class="spin"></div>' +
    '<p>Firebase\'den son fiyatlar yükleniyor...</p>' +
  '</div>' +
  '<div id="fb-toast"></div>' +
  '<div id="fb-sync"></div>'
);
// Bu cihazda daha once giris yapildiysa: sifre sormadan otomatik oturum ac
(function(){
  var savedRt = loadSavedRefreshToken();
  if(savedRt){
    FB_REFRESH_TOKEN = savedRt;
    showFBLoading('Oturum açılıyor...');
    refreshIdToken().then(function(){
      showLogoutBtn();
      showFBLoading('Firebase\'den son fiyatlar yükleniyor...');
      loadFromFirebase();
    }).catch(function(){
      clearAuth();
      hideFBLoading();
      openAuthGate();
    });
  } else {
    openAuthGate();
  }
})();
</script>
