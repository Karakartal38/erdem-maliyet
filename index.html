<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erdem Yatakları - Maliyet Yönetim Sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- PWA: bilgisayara/telefona uygulama gibi yuklenebilir -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Erdem Maliyet">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script>
/* Service worker kaydi - yuklenebilirlik + cevrimdisi kabuk */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function (e) { console.warn('SW kaydi basarisiz', e); });
  });
}
/* "Uygulamayi Yukle" butonu (Chrome/Edge) */
(function () {
  var deferred = null;
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault(); deferred = e; showInstallBtn();
  });
  function showInstallBtn() {
    if (document.getElementById('pwaInstallBtn')) return;
    var b = document.createElement('button');
    b.id = 'pwaInstallBtn';
    b.textContent = '⬇ Uygulamayı Yükle';
    b.style.cssText = 'position:fixed;right:16px;bottom:16px;z-index:99999;background:#f59e0b;color:#0f1117;border:none;padding:10px 16px;border-radius:10px;font-weight:700;font-family:inherit;font-size:13px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.4)';
    b.onclick = function () {
      if (!deferred) return;
      deferred.prompt();
      deferred.userChoice.then(function () { deferred = null; b.remove(); });
    };
    (document.body || document.documentElement).appendChild(b);
  }
  window.addEventListener('appinstalled', function () {
    var b = document.getElementById('pwaInstallBtn'); if (b) b.remove();
  });
})();
</script>
<style>
/* ══════════ Tasarım değişkenleri (design tokens) ══════════ */
/* Değişken adları (--bg, --s, --a, ...) JS inline stillerinde kullanılıyor — adlar sabit. */
:root{
  --bg:#0b0e15;--s:#131826;--s2:#1b2233;--br:#262e42;
  --t:#e8ebf4;--t2:#98a1b8;
  --a:#f59e0b;--a2:#fb923c;--g:#22c55e;--r:#ef4444;--b:#3b82f6;--p:#8b5cf6;
  --on-a:#1a1205;
  --ring:0 0 0 3px rgba(245,158,11,.2);
  --sh-sm:0 1px 2px rgba(0,0,0,.35);
  --sh-md:0 4px 14px rgba(0,0,0,.35);
  --sh-lg:0 24px 64px rgba(0,0,0,.55);
}
[data-theme="light"]{
  --bg:#f4f6f9;--s:#ffffff;--s2:#f1f4f8;--br:#e2e7f0;
  --t:#151b28;--t2:#5b6472;
  --a:#b45309;--a2:#9a3412;--g:#15803d;--r:#dc2626;--b:#1d4ed8;--p:#6d28d9;
  --on-a:#ffffff;
  --ring:0 0 0 3px rgba(180,83,9,.14);
  --sh-sm:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.07);
  --sh-md:0 4px 14px rgba(16,24,40,.08),0 2px 4px rgba(16,24,40,.04);
  --sh-lg:0 24px 64px rgba(16,24,40,.22);
}

/* ══════════ Taban ══════════ */
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-width:thin;scrollbar-color:var(--br) transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;transition:background-color .25s ease,color .25s ease}
::selection{background:rgba(245,158,11,.3)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--br);border-radius:8px;border:2px solid var(--s)}
::-webkit-scrollbar-thumb:hover{background:var(--t2)}
.app{display:flex;min-height:100vh}

/* ══════════ Kenar çubuğu / gezinme ══════════ */
.side{width:256px;background:var(--s);border-right:1px solid var(--br);position:fixed;height:100vh;overflow-y:auto;z-index:10;padding:0 0 8px;display:flex;flex-direction:column;transition:background-color .25s ease}
.logo-area{padding:22px 16px 16px;border-bottom:1px solid var(--br);text-align:center;margin-bottom:6px}
.logo-area img{width:120px;height:auto;margin-bottom:8px}
.logo-area p{font-size:9px;color:var(--t2);letter-spacing:2.5px;font-weight:600}
.ni{margin:1px 10px;padding:9px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;color:var(--t2);transition:background-color .15s,color .15s;border-left:3px solid transparent;user-select:none}
.ni:hover{background:var(--s2);color:var(--t)}
.ni.ac{background:rgba(245,158,11,.1);color:var(--a);border-left-color:var(--a);font-weight:700}
.ns{padding:18px 22px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);font-weight:700;opacity:.85}

/* ══════════ Ana içerik ══════════ */
.mn{margin-left:256px;flex:1;padding:28px 32px;min-height:100vh;min-width:0}
.pt{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.psu{font-size:13px;color:var(--t2);margin-bottom:24px}

/* Özet kartları */
.cds{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.cd{background:var(--s);border:1px solid var(--br);border-radius:12px;padding:18px;box-shadow:var(--sh-sm);transition:border-color .15s,box-shadow .15s}
.cd:hover{border-color:var(--t2);box-shadow:var(--sh-md)}
.cd .lb{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.cd .vl{font-size:24px;font-weight:800;margin-top:6px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}

/* ══════════ Tablolar ══════════ */
.tw{background:var(--s);border:1px solid var(--br);border-radius:12px;overflow:hidden;margin-bottom:24px;box-shadow:var(--sh-sm)}
.th2{padding:14px 18px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.th2 h3{font-size:14px;font-weight:700;letter-spacing:-.01em}
table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
thead th{background:var(--s2);padding:10px 14px;text-align:left;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--t2);position:sticky;top:0;white-space:nowrap;z-index:2;border-bottom:1px solid var(--br)}
tbody td{padding:10px 14px;border-bottom:1px solid var(--br)}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background-color .1s}
tbody tr:hover{background:rgba(245,158,11,.05)}
.tr2 td{font-weight:700;background:rgba(245,158,11,.07)}
.ch{color:var(--a);font-weight:700}
.pg{color:var(--g)}.pb2{color:var(--b)}

/* Tablo içi fiyat girişleri */
.pi{background:var(--bg);border:1px solid var(--br);color:var(--a);padding:5px 8px;border-radius:7px;font-size:12.5px;width:90px;text-align:right;font-family:inherit;font-weight:700;font-variant-numeric:tabular-nums;transition:border-color .15s,box-shadow .15s}
.pi:hover{border-color:var(--t2)}
.pi:focus{outline:none;border-color:var(--a);box-shadow:var(--ring)}
.ps2{width:60px;font-size:11.5px;padding:4px 6px}

/* Rozetler */
.bg{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10.5px;font-weight:700;letter-spacing:.2px}
.bg-a{background:rgba(245,158,11,.14);color:var(--a)}.bg-g{background:rgba(34,197,94,.14);color:var(--g)}
.bg-b{background:rgba(59,130,246,.14);color:var(--b)}.bg-p{background:rgba(139,92,246,.14);color:var(--p)}
.bg-r{background:rgba(239,68,68,.14);color:var(--r)}
.ctg{display:inline-block;padding:2px 6px;border-radius:5px;font-size:9.5px;font-weight:600;background:var(--s2);color:var(--t2)}

/* ══════════ Form kontrolleri ══════════ */
select.fs{background:var(--bg);border:1px solid var(--br);color:var(--t);padding:7px 10px;border-radius:8px;font-size:12.5px;font-family:inherit;cursor:pointer;transition:border-color .15s,box-shadow .15s}
select.fs:hover{border-color:var(--t2)}
select.fs:focus{outline:none;border-color:var(--a);box-shadow:var(--ring)}
.si{background:var(--bg);border:1px solid var(--br);color:var(--t);padding:8px 12px;border-radius:8px;font-size:12.5px;font-family:inherit;width:200px;max-width:100%;transition:border-color .15s,box-shadow .15s}
.si::placeholder{color:var(--t2);opacity:.7}
.si:hover{border-color:var(--t2)}
.si:focus{outline:none;border-color:var(--a);box-shadow:var(--ring)}
.ct{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}

/* ══════════ Butonlar ══════════ */
.bt{padding:8px 15px;border-radius:8px;border:1px solid var(--br);background:var(--s2);color:var(--t);font-size:12.5px;font-family:inherit;cursor:pointer;font-weight:600;transition:background-color .15s,border-color .15s,color .15s,box-shadow .15s,transform .05s;box-shadow:var(--sh-sm)}
.bt:hover{background:var(--br);border-color:var(--t2)}
.bt:active{transform:translateY(1px)}
.bt:focus-visible{outline:none;box-shadow:var(--ring)}
.bt-p{background:var(--a);color:var(--on-a);border-color:var(--a)}
.bt-p:hover{background:var(--a2);border-color:var(--a2)}
.bt-g{background:var(--g);color:var(--on-a);border-color:var(--g)}
.bt-g:hover{background:var(--g);border-color:var(--g);filter:brightness(1.12)}
.bt-r{background:var(--r);color:#fff;border-color:var(--r)}
.bt-r:hover{background:var(--r);border-color:var(--r);filter:brightness(1.12)}
.bt-b{background:var(--b);color:#fff;border-color:var(--b)}
.bt-b:hover{background:var(--b);border-color:var(--b);filter:brightness(1.12)}
.st{max-height:500px;overflow:auto}

/* ══════════ Sekmeler ══════════ */
.tbb{display:flex;gap:4px;margin-bottom:18px;background:var(--s);padding:4px;border-radius:10px;border:1px solid var(--br);flex-wrap:wrap;box-shadow:var(--sh-sm)}
.ta{padding:8px 16px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--t2);transition:background-color .15s,color .15s;user-select:none}
.ta:hover{color:var(--t);background:var(--s2)}
.ta.ac{background:var(--a);color:var(--on-a);font-weight:700;box-shadow:var(--sh-sm)}

/* Parametre / araç çubuğu */
.pbb{display:flex;gap:14px;align-items:center;flex-wrap:wrap;background:var(--s);padding:12px 18px;border-radius:12px;border:1px solid var(--br);margin-bottom:18px;box-shadow:var(--sh-sm)}
.pbb .gr{display:flex;align-items:center;gap:6px}
.pbb label{font-size:11.5px;color:var(--t2);font-weight:600}
.pbb .sep{width:1px;height:24px;background:var(--br)}

/* ══════════ Modal ══════════ */
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(8,10,16,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.md{background:var(--s);border:1px solid var(--br);border-radius:16px;padding:26px;max-width:95vw;width:900px;max-height:85vh;overflow-y:auto;box-shadow:var(--sh-lg)}
.md h2{font-size:17px;font-weight:800;letter-spacing:-.01em;margin-bottom:16px}
.md .cl{float:right;background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1;transition:background-color .15s,color .15s}
.md .cl:hover{background:var(--s2);color:var(--t)}
.rr{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--br);flex-wrap:wrap}
.rr .nm{flex:1;min-width:140px;font-size:12.5px;font-weight:600}
.rr .del{color:var(--r);cursor:pointer;font-size:15px;padding:4px 7px;border-radius:6px;transition:background-color .15s}
.rr .del:hover{background:rgba(239,68,68,.12)}
.ar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;align-items:center}

/* ══════════ Teklif formu ══════════ */
.q-form{background:var(--s);border:1px solid var(--br);border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:var(--sh-sm)}
.q-form label{font-size:11.5px;color:var(--t2);display:block;margin-bottom:5px;font-weight:600}
.q-form input,.q-form textarea{background:var(--bg);border:1px solid var(--br);color:var(--t);padding:9px 12px;border-radius:8px;font-size:13px;font-family:inherit;width:100%;margin-bottom:14px;transition:border-color .15s,box-shadow .15s}
.q-form input:hover,.q-form textarea:hover{border-color:var(--t2)}
.q-form input:focus,.q-form textarea:focus{outline:none;border-color:var(--a);box-shadow:var(--ring)}
.q-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.q-total{font-size:22px;font-weight:800;color:var(--a);text-align:right;padding:12px 0;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.add-product-area{background:var(--s);border:1px solid var(--br);border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:var(--sh-sm)}
.add-product-area h4{font-size:13px;font-weight:700;margin-bottom:12px}
.add-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end}
.add-grid label{font-size:10.5px;color:var(--t2);display:block;margin-bottom:4px;font-weight:600}

/* Teklif kalemi (düzenlenebilir satır) */
.qi{display:grid;grid-template-columns:30px 1fr 100px 70px 50px 110px 30px;gap:8px;align-items:center;padding:10px 14px;background:var(--s2);border:1px solid var(--br);border-radius:10px;margin-bottom:6px;font-size:12.5px}
.qi input{background:var(--bg);border:1px solid var(--br);color:var(--t);padding:5px 7px;border-radius:6px;font-size:12px;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.qi input:focus{outline:none;border-color:var(--a);box-shadow:var(--ring)}
.qi .rgt{text-align:right;font-weight:700;color:var(--a);font-variant-numeric:tabular-nums}
.qi .rm{color:var(--r);cursor:pointer;font-size:16px;text-align:center;border-radius:6px;transition:background-color .15s}
.qi .rm:hover{background:rgba(239,68,68,.12)}
.qi-hdr{display:grid;grid-template-columns:30px 1fr 100px 70px 50px 110px 30px;gap:8px;padding:6px 14px;font-size:10px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.5px}

/* ══════════ Teklif önizleme (baskı görünümü — her iki temada beyaz kalır) ══════════ */
.preview-frame{background:#fff;color:#1a1a1a;border-radius:10px;padding:40px;margin:0 auto 20px;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:var(--sh-md);border:1px solid var(--br)}
.preview-frame h1{font-size:22px;color:#8b0000;text-align:center;margin:16px 0 8px}
.preview-frame .pf-line{height:2px;background:linear-gradient(90deg,#8b0000,#d4a574,#8b0000);margin:12px 0}
.preview-frame table{width:100%;border-collapse:collapse;margin:16px 0;font-size:12px}
.preview-frame th{background:#8b0000;color:#fff;padding:8px 10px;text-align:left;font-size:10px;font-weight:600;position:static}
.preview-frame td{padding:7px 10px;border-bottom:1px solid #e5e5e5}
.preview-frame tr:nth-child(even){background:#fafafa}
.preview-frame tbody tr:hover{background:#fafafa}
.preview-frame .pf-total{text-align:right;font-size:18px;font-weight:800;color:#8b0000;padding:12px 0;border-top:2px solid #8b0000}
.preview-frame .pf-info{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.preview-frame .pf-box{background:#f8f8f8;border-radius:6px;padding:12px;font-size:11px}
.preview-frame .pf-box strong{display:block;font-size:9px;text-transform:uppercase;color:#888;margin-bottom:4px;letter-spacing:1px}
.preview-frame .pf-footer{text-align:center;font-size:9px;color:#999;margin-top:20px;padding-top:12px;border-top:1px solid #e5e5e5}

/* ══════════ Mobil (≤900px): kenar çubuğu yatay üst çubuğa dönüşür ══════════ */
@media(max-width:900px){
  .app{flex-direction:column}
  .side{position:sticky;top:0;width:100%;height:auto;min-height:0;flex-direction:row;align-items:center;overflow-x:auto;overflow-y:hidden;border-right:none;border-bottom:1px solid var(--br);padding:8px;gap:2px;box-shadow:var(--sh-sm)}
  .side::-webkit-scrollbar{display:none}
  .logo-area{flex:none;display:flex;align-items:center;padding:0 10px 0 4px;border-bottom:none;margin-bottom:0}
  .logo-area img{width:64px;margin-bottom:0}
  .logo-area p{display:none}
  .ns{display:none;padding:0 6px 0 12px;white-space:nowrap;align-items:center;gap:8px;flex:none}
  #extra-groups{display:contents}
  .ni{flex:none;white-space:nowrap;margin:0 2px;padding:8px 12px;border-left:none;border-radius:8px}
  .ni.ac{border-left:none}
  .theme-toggle{flex:none;white-space:nowrap;border-top:none;margin-top:0;border-radius:8px;padding:8px 12px}
  .mn{margin-left:0;padding:16px}
  .cds{gap:10px}
  .tw{overflow-x:auto}
  .q-grid{grid-template-columns:1fr}
  .add-grid{grid-template-columns:1fr 1fr}
  .qi{grid-template-columns:20px 1fr 80px 60px 40px 90px 24px;font-size:11px}
  .qi-hdr{grid-template-columns:20px 1fr 80px 60px 40px 90px 24px}
  .md{padding:18px;border-radius:12px}
  .preview-frame{padding:20px}
}
@media(max-width:560px){
  .mn{padding:12px}
  .pt{font-size:19px}
  .cds{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
  .add-grid{grid-template-columns:1fr}
  .pbb{gap:10px;padding:10px 12px}
  .pbb .sep{display:none}
  .si{width:100%}
}
#fb-loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,17,23,0.93);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#fb-loading .spin{width:48px;height:48px;border:4px solid rgba(245,158,11,0.2);border-top-color:#f59e0b;border-radius:50%;animation:sp 0.8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#fb-loading p{color:#9198ab;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif}
</style>
</head>
<body>
<div class="app">
<div class="side">
  <div class="logo-area">
    <img id="logoImg" alt="Erdem">
    <p>MALİYET YÖNETİMİ</p>
  </div>
  <div class="ns">Ana Menü</div>
  <div class="ni ac" onclick="go('dash',this)"><span>📊</span> Genel Bakış</div>
  <div class="ni" onclick="go('mat',this)"><span>🧱</span> Hammadde Fiyatları</div>
  <div class="ns" style="display:flex;align-items:center;justify-content:space-between;padding-right:12px">
    <span>Ürün Grupları</span>
    <span onclick="oNG()" title="Yeni Grup Ekle" style="cursor:pointer;color:var(--a);font-size:14px;font-weight:700;line-height:1">+</span>
  </div>
  <div class="ni" onclick="go('yatak',this)"><span>🛏️</span> Yatak</div>
  <div class="ni" onclick="go('baslik',this)"><span>🎯</span> Başlık</div>
  <div class="ni" onclick="go('baza',this)"><span>📦</span> Baza</div>
  <div class="ni" onclick="go('kanepe',this)"><span>🛋️</span> Kanepe</div>
  <div class="ni" onclick="go('tekstil',this)"><span>🧵</span> Tekstil</div>
  <div id="extra-groups"></div>
  <div class="ns">Raporlar</div>
  <div class="ni" onclick="go('pl',this)"><span>📋</span> Fiyat Listesi</div>
  <div class="ni" onclick="go('quote',this)"><span>📄</span> Fiyat Teklifi</div>
  <div style="flex:1"></div>
  <div class="theme-toggle" onclick="toggleTheme()" id="themeBtn"><span>🌙</span> Koyu Tema</div>
</div>
<div class="mn" id="mc"></div>
</div>
<div id="mr"></div>
<style>
#fb-toast{position:fixed;bottom:20px;right:20px;background:var(--s);border:1px solid var(--br);border-radius:10px;padding:10px 16px;font-size:12.5px;font-weight:600;color:var(--t2);z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:var(--sh-md)}
#fb-toast.show{opacity:1}
#fb-toast.ok{color:var(--g);border-color:#22c55e40}

// ===== TEKSTİL =====
function calcT(model){
  var recipe=S.tr[model]||[];
  var total=0;
  recipe.forEach(function(item){
    var bp=(item && isFinite(parseFloat(item.up))) ? parseFloat(item.up) : ((S.mp[item.p]!=null)?S.mp[item.p]:0);
    total+=bp*item.qty;
  });
  return total;
}
function fullCostT(model){
  if(S.tgm && S.tgm[model]!=null && isFinite(parseFloat(S.tgm[model]))){
    var ov=parseFloat(S.tgm[model]);
    if(ov>=0) return ov;
  }
  var mat=calcT(model);
  var pr=S.pr.tekstil||20;
  // Basit overhead: %20 genel gider dahil
  var oh=0.15;
  return mat*(1+oh);
}
function setTGenelMaliyet(model,val){
  if(!model) return;
  var n=parseFloat(val);
  if(!isFinite(n) || n<0){ alert('Geçerli genel maliyet girin'); return; }
  if(!S.tgm) S.tgm={};
  S.tgm[model]=n;
  autoSave(); R();
}
function clearTGenelMaliyet(model){
  if(!S.tgm) return;
  delete S.tgm[model];
  autoSave(); R();
}
function tTypeLabel(v){
  if(v==='cift') return 'Çift Kişilik';
  if(v==='tek') return 'Tek Kişilik';
  return 'Standart';
}
function tTypeKey(v){
  v=String(v||'').toLowerCase();
  if(v==='cift' || v==='çift') return 'cift';
  return 'tek';
}
function getTType(model){
  var m=(S.trMeta && S.trMeta[model]) ? S.trMeta[model] : null;
  return tTypeKey(m && m.type ? m.type : 'tek');
}
function setTType(model, v){
  if(!model) return;
  if(!S.trMeta) S.trMeta={};
  S.trMeta[model]=S.trMeta[model]||{};
  S.trMeta[model].type=tTypeKey(v);
  autoSave(); R();
}
function onTEMatChange(){
  var sel=document.getElementById('te-mat');
  var up=document.getElementById('te-up');
  if(!sel || !up) return;
  var p=sel.value;
  var mat=D.materials.find(function(m){ return m.p===p; });
  var v=(S.mp[p]!=null)?S.mp[p]:(mat?mat.pr:0);
  up.value=isFinite(parseFloat(v))?parseFloat(v):0;
}
function collectTPrices(){
  var map={};
  Object.keys(S.tr||{}).forEach(function(model){
    var arr=S.tr[model]||[];
    arr.forEach(function(it){
      if(!it || !it.p) return;
      var key=it.p;
      var val=isFinite(parseFloat(it.up))?parseFloat(it.up):((S.mp[key]!=null)?parseFloat(S.mp[key]):0);
      if(!map[key]) map[key]={p:key,up:val,count:0};
      map[key].count++;
    });
  });
  return map;
}
function setTPriceAll(name,val){
  if(!name) return;
  var n=parseFloat(val);
  if(!isFinite(n) || n<0){ alert('Geçerli fiyat girin'); return; }
  Object.keys(S.tr||{}).forEach(function(model){
    (S.tr[model]||[]).forEach(function(it){
      if(it && it.p===name) it.up=n;
    });
  });
  autoSave(); R();
}

function oNT(){
  var name=cleanName(prompt('Yeni tekstil modeli adı:')||'');
  if(!name||!name.trim())return;
  name=name.trim();
  if(S.tr[name]){alert('Bu isimde model zaten var!');return;}
  if(!S.trMeta) S.trMeta={};
  S.tr[name]=[];
  S.trMeta[name]={type:'tek'};
  S.sel.tekstil=name;
  autoSave();R();
}

function delTModel(model){
  if(!confirm(model+' modelini silmek istediğinize emin misiniz?'))return;
  delete S.tr[model];
  if(S.trMeta) delete S.trMeta[model];
  if(S.tgm) delete S.tgm[model];
  delete S.mpr[model];
  S.sel.tekstil=Object.keys(S.tr)[0]||null;
  autoSave();R();
}

function oTE(model){
  if(!S.tr[model])return;
  var mats=D.materials.map(function(m){return m.p;});
  // Ek hammadde seçenekleri (tekstile özgü)
  var extra=['POLYESTER KUMAŞ','PAMUKLU KUMAŞ','MİKROFİBER KUMAŞ','SAFİR KUMAŞ','BARIYER KUMAŞ','TERMİK YÜZEY','ELASTİK ŞERİT','FERMELİ','ETİKET','AMBALAJ'];
  mats=mats.concat(extra.filter(function(e){return mats.indexOf(e)<0;}));

  var opts=mats.map(function(p){return '<option value="'+p+'">'+p+'</option>';}).join('');
  var firstMat=mats[0]||'';

    '<div><label style="font-size:11px;color:var(--t2)">Özel Malzeme Adı (opsiyonel)</label><input id="te-custom" class="si" placeholder="Örn: Dış Kumaş A" style="width:100%"></div>'+

    '</div>';
  document.body.appendChild(overlay);
}

function addTItem(model){
  var p=document.getElementById('te-mat').value;
  var custom=cleanName(document.getElementById('te-custom').value||'');
  if(custom) p=custom.toUpperCase();
  if(!p) return;
  var u=document.getElementById('te-unit').value||'METRE';
  var qty=parseFloat(document.getElementById('te-qty').value)||1;
  var up=parseFloat(document.getElementById('te-up').value);
  var mat=D.materials.find(function(m){return m.p===p;});
  if(!isFinite(up)) up=S.mp[p]||(mat?mat.pr:0);
  S.tr[model].push({p:p,u:u,qty:qty,up:up,co:up*qty});
  autoSave();R();
  document.getElementById('t-editor-overlay')&&document.getElementById('t-editor-overlay').remove();
}

function doAG(){

  if(!name){alert('Grup adı girin');return;}
  var key=name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  if(!key){alert('Geçerli grup adı girin');return;}
  if(['dash','mat','yatak','baslik','baza','kanepe','tekstil','pl','quote'].indexOf(key)>=0 || S.xg[key]){alert('Bu grup zaten var');return;}
  S.xg[key]={};
  S.xmeta[key]={name:name,icon:(cleanName(document.getElementById('agIcon').value)||'🧩')};
  S.pr[key]=parseFloat(document.getElementById('agPr').value)||20;
  S.isc[key]=S.isc[key]||{_default:15};
  S.sel[key]=null;
  rXNav();
  clm();
  go(key, document.querySelector('#extra-groups .ni:last-child'));
  autoSave();
}

function buildAuditEntry(){
  var changes=[];
  if(LAST_MP_VALUES){
    Object.keys(S.mp||{}).forEach(function(k){
      var ov=LAST_MP_VALUES[k], nv=S.mp[k];
      if(ov==null || nv==null) return;
      ov=parseFloat(ov); nv=parseFloat(nv);
      if(!isFinite(ov)||!isFinite(nv)||ov===nv) return;
      var pct=ov===0 ? 100000 : Math.abs(nv-ov)/Math.abs(ov)*100;
      changes.push({k:k,p:pct});
    });
  }
  changes.sort(function(a,b){return b.p-a.p;});
  var top=changes.slice(0,5).map(function(x){return x.k+' (%'+x.p.toFixed(1)+')';});
  return {
    at:new Date().toISOString(),
    who:DEVICE_ID,
    what: top.length ? ('Fiyat güncellemesi: '+top.join(', ')) : 'Genel veri güncellemesi',
    mode: MANUAL_EDIT ? 'manuel' : 'otomatik'
  };
}

function validateState(){
  function isNum(v){ return typeof v==='number' ? isFinite(v) : (v!=null && isFinite(parseFloat(v))); }
  D.materials.forEach(function(m){
    var v = S.mp[m.p];
    if(v==null || !isNum(v)) throw new Error('Hammadde fiyatı geçersiz: '+m.p);
    if(v < 0) throw new Error('Hammadde fiyatı negatif: '+m.p);
  });
  ['gu','an','fn','am','sn','fr'].forEach(function(k){
    if(!isNum(S.oh[k]) || S.oh[k] < 0) throw new Error('Genel gider oranı negatif: '+k);
  });
  ['gu','an','fn','am','sn','fr'].forEach(function(k){
    if(!isNum(S.koh[k]) || S.koh[k] < 0) throw new Error('Kanepe gider oranı negatif: '+k);
  });
  if(!isNum(S.koh.is_sabit) || S.koh.is_sabit < 0) throw new Error('Kanepe varsayılan işçilik negatif');
  if(S.koh.is_model && typeof S.koh.is_model==='object'){
    Object.keys(S.koh.is_model).forEach(function(k){
      if(!isNum(S.koh.is_model[k]) || S.koh.is_model[k] < 0) throw new Error('Kanepe model işçilik negatif: '+k);
    });
  }
  function validateSized(recs, grp){
    if(!recs) return;
    Object.keys(recs).forEach(function(model){
      var arr=recs[model];
      if(!Array.isArray(arr) || arr.length===0) return;
      arr.forEach(function(it){
        if(!it || !it.p) return;
        if(it.up!=null && (!isNum(it.up) || it.up < 0)) throw new Error('Geçersiz birim fiyat: '+grp+'/'+model+'/'+it.p);
        if(it.q && typeof it.q==='object'){
          var keys = Object.keys(it.q);
          if(keys.length > 0){
            var sum=0;
            keys.forEach(function(sz){ var q=it.q[sz]; if(!isNum(q)||q<0) throw new Error('Negatif miktar: '+grp+'/'+model+'/'+it.p+'/'+sz); sum+=parseFloat(q); });
            if(sum<=0) throw new Error('Boş miktar: '+grp+'/'+model+'/'+it.p);
          }
        }
      });
    });
  }
  validateSized(S.yr,'yatak'); validateSized(S.br,'baslik'); validateSized(S.bzr,'baza');
  if(S.xg) Object.keys(S.xg).forEach(function(g){ validateSized(S.xg[g],g); });
  function validateK(recs){
    if(!recs) return;
    Object.keys(recs).forEach(function(model){
      var arr=recs[model]; if(!Array.isArray(arr)||arr.length===0) return;
      arr.forEach(function(it){ if(!it||!it.p) return;
        if(it.qty!=null&&(!isNum(it.qty)||it.qty<0)) throw new Error('Negatif miktar: kanepe/'+model+'/'+it.p);
        if(it.up!=null&&(!isNum(it.up)||it.up<0)) throw new Error('Geçersiz fiyat: kanepe/'+model+'/'+it.p);
      });
    });
  }
  validateK(S.kr);
  if(S.tr){ Object.keys(S.tr).forEach(function(model){
    var arr=S.tr[model]; if(!Array.isArray(arr)||arr.length===0) return;
    arr.forEach(function(it){ if(!it||!it.p) return;
      if(it.qty!=null&&(!isNum(it.qty)||it.qty<0)) throw new Error('Negatif miktar: tekstil/'+model+'/'+it.p);
      if(it.up!=null&&(!isNum(it.up)||it.up<0)) throw new Error('Geçersiz fiyat: tekstil/'+model+'/'+it.p);
    });
  });}
  return true;
}

function checkPriceWarning(){
  if(!LAST_MP_VALUES) return true;
  var worstKey='', maxPct=0;
  Object.keys(LAST_MP_VALUES).forEach(function(k){
    if(S.mp[k]==null) return;
    var oldV=parseFloat(LAST_MP_VALUES[k]), newV=parseFloat(S.mp[k]);
    if(!isFinite(oldV)||!isFinite(newV)) return;
    var pct = oldV===0 ? (newV===0?0:100000) : Math.abs(newV-oldV)/Math.abs(oldV)*100;
    if(pct>maxPct){ maxPct=pct; worstKey=k; }
  });
  if(maxPct>=WARN_PCT) return confirm('\u26a0\ufe0f Fiyat değişim eşiği aşıldı.\nEn fazla: '+worstKey+' (%'+maxPct.toFixed(1)+')\nKaydetmek istiyor musunuz?');
  return true;
}

  }

// JSON dosyası olarak yedek indir
function exportBackup(){
  try{

      _erdem_backup: true,
      _version: 2,
      _exported_at: new Date().toISOString(),
      _device: DEVICE_ID,
      S: S,
      materials: D.materials
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
    var timeStr = new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}).replace(':','');
    a.href = url;
    a.download = 'erdem_maliyet_yedek_' + dateStr + '_' + timeStr + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    // Son yedek tarihini kaydet
    localStorage.setItem('erdem_maliyet_v7_last_export', String(Date.now()));
    toast('\u2705 Yedek dosyası indirildi', 'ok', 3000);
    R(); // dashboard'u yenile (son yedek bilgisini güncelle)

    toast('\u274c Yedek alınamadı: '+(e&&e.message?e.message:e), 'err', 5000);
  }
}

// JSON dosyasından yedek yükle
function importBackup(fileInput){
  var file = fileInput && fileInput.files && fileInput.files[0];
  if(!file){ return; }
  if(!file.name.endsWith('.json')){
    toast('\u274c Sadece .json dosyası kabul edilir', 'err', 4000);
    fileInput.value=''; return;
  }
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      // Doğrulama
      if(!data || typeof data !== 'object'){
        throw new Error('Geçersiz dosya formatı');
      }
      // Yeni format kontrolü
      if(data._erdem_backup){
        if(!data.S || !data.materials){
          throw new Error('Yedek dosyası eksik veri içeriyor');
        }
      }
      // Eski format desteği (S ve materials doğrudan varsa)
      else if(!data.S && !data.materials){
        throw new Error('Bu dosya Erdem Maliyet yedeği değil');
      }
      var exportDate = data._exported_at ? new Date(data._exported_at).toLocaleString('tr-TR') : 'Bilinmiyor';
      var matCount = Array.isArray(data.materials) ? data.materials.length : '?';
      var msg = 'Bu yedek yüklensin mi?\\n\\n' +
        'Yedek tarihi: ' + exportDate + '\\n' +
        'Hammadde sayısı: ' + matCount + '\\n\\n' +
        'DİKKAT: Mevcut tüm verileriniz bu yedekle değiştirilecek!\\n' +
        'Önce mevcut verinizin yedeğini almak ister misiniz?';
      if(!confirm(msg)){
        fileInput.value=''; return;
      }
      // Mevcut veriyi güvenlik için revision olarak kaydet
      saveLocalRevision('before-import');
      // Veriyi uygula
      if(data.S && typeof data.S === 'object'){
        Object.keys(data.S).forEach(function(k){ S[k] = data.S[k]; });
      }
      if(Array.isArray(data.materials) && data.materials.length){
        D.materials = data.materials;
      }
      // mp'yi güncelle
      D.materials.forEach(function(m){
        if(S.mp[m.p] === undefined) S.mp[m.p] = m.pr;
      });
      MANUAL_EDIT = false;
      saveLocalBackup({S:S, materials:D.materials, at:new Date().toISOString()});
      saveLocalRevision('import-ok');
      LAST_MP_VALUES = snapshotMP();
      rXNav();
      clm();
      R();
      toast('\u2705 Yedek başarıyla yüklendi!', 'ok', 3000);

// Yedek hatırlatıcısı — 7 günden eski ise uyarı göster
function checkBackupReminder(){
  try{
    var lastExport = localStorage.getItem('erdem_maliyet_v7_last_export');
    if(!lastExport){
      // İlk kullanım, 3 gün sonra hatırlat
      var firstUse = localStorage.getItem('erdem_maliyet_v7_first_use');
      if(!firstUse){
        localStorage.setItem('erdem_maliyet_v7_first_use', String(Date.now()));
        return;
      }
      var daysSinceFirst = (Date.now() - parseInt(firstUse)) / (1000*60*60*24);
      if(daysSinceFirst > 3){
        showBackupReminder('Henüz hiç yedek almadınız. Verilerinizi kaybetmemek için yedek alın!');
      }
      return;
    }
    var daysSince = (Date.now() - parseInt(lastExport)) / (1000*60*60*24);
    if(daysSince > 7){
      showBackupReminder('Son yedeğiniz ' + Math.floor(daysSince) + ' gün önce alındı. Güncel yedek almanız önerilir.');
    }
  }catch(e){}
}

// Firebase'den yükle — tüm veriyi S üzerine uygula
// Firebase array'leri {0:x, 1:y} objesine çevirebilir — toArr ile düzelt
function toArr(v){
  if(Array.isArray(v)) return v.filter(function(x){return x!=null;});
  if(v && typeof v==='object'){
    var keys=Object.keys(v);
    var isNumeric=keys.length>0 && keys.every(function(k){return /^\d+$/.test(k);});
    if(isNumeric){
      var arr=[];
      keys.forEach(function(k){if(v[k]!=null) arr.push(v[k]);});
      return arr;
    }
  }
  return [];
}

function applyServerData(data){
  if(!data || typeof data!=='object') return false;

    // Hammadde fiyatları (array format: [{p:name, v:price}] veya eski object format)
    if(data.mp){
      var mpList = toArr(data.mp);
      if(mpList.length > 0){
        mpList.forEach(function(item){ if(item && item.p) S.mp[item.p] = item.v; });
      } else if(typeof data.mp === 'object'){
        // Eski object format (backward compat)
        Object.keys(data.mp).forEach(function(k){ S.mp[k] = data.mp[k]; });
      }
    }
    // Kâr oranları (grup)
    if(data.pr){
      Object.keys(data.pr).forEach(function(k){ S.pr[k] = data.pr[k]; });
    }
    // Model bazlı kâr oranları (decode keys)
    if(data.mpr){
      Object.keys(data.mpr).forEach(function(k){ S.mpr[fbDec(k)] = data.mpr[k]; });
    }
    // KDV
    if(data.kdv != null) S.kdv = data.kdv;
    // Genel gider oranları
    if(data.oh){
      ['gu','an','fn','am','sn','fr'].forEach(function(k){ if(data.oh[k]!=null) S.oh[k]=data.oh[k]; });
      if(data.oh.extra) S.oh.extra = toArr(data.oh.extra);
    }
    // Kanepe gider oranları
    if(data.koh){
      ['gu','an','fn','am','sn','fr'].forEach(function(k){ if(data.koh[k]!=null) S.koh[k]=data.koh[k]; });
      if(data.koh.isSabit!=null) S.koh.is_sabit=data.koh.isSabit;
      if(data.koh.is_sabit!=null) S.koh.is_sabit=data.koh.is_sabit;
    }
    // İşçilik oranları (decode keys)
    if(data.isc){
      Object.keys(data.isc).forEach(function(grp){
        var realGrp = fbDec(grp);
        if(!S.isc[realGrp]) S.isc[realGrp]={};
        if(data.isc[grp] && typeof data.isc[grp]==='object'){
          Object.keys(data.isc[grp]).forEach(function(m){ S.isc[realGrp][fbDec(m)]=data.isc[grp][m]; });
        }
      });
    }
    // Tekstil reçeteleri (decode keys + array fix)
    if(data.tr){
      S.tr = {};
      Object.keys(data.tr).forEach(function(k){
        S.tr[fbDec(k)] = toArr(data.tr[k]);
      });
    }
    if(data.trm && typeof data.trm==='object'){
      S.trMeta = {};
      Object.keys(data.trm).forEach(function(k){
        var mk=fbDec(k);
        var mv=data.trm[k]||{};
        S.trMeta[mk]={type:tTypeKey(mv.type)};
      });
    }
    if(data.tgm && typeof data.tgm==='object'){
      S.tgm = {};
      Object.keys(data.tgm).forEach(function(k){
        var mk=fbDec(k);
        var v=parseFloat(data.tgm[k]);
        if(isFinite(v) && v>=0) S.tgm[mk]=v;
      });
    }
    if(data.kgm && typeof data.kgm==='object'){
      S.kgm = {};
      Object.keys(data.kgm).forEach(function(k){
        var mk=fbDec(k);
        var v=parseFloat(data.kgm[k]);
        if(isFinite(v) && v>=0) S.kgm[mk]=v;
      });
    }
    if(data.sgm && typeof data.sgm==='object'){
      S.sgm = {};
      Object.keys(data.sgm).forEach(function(g){
        var realGrp=fbDec(g);
        S.sgm[realGrp]={};
        var gmByModel=data.sgm[g]||{};
        Object.keys(gmByModel).forEach(function(mk){
          var realModel=fbDec(mk);
          var bySize=gmByModel[mk]||{};
          S.sgm[realGrp][realModel]={};
          Object.keys(bySize).forEach(function(sz){
            var v=parseFloat(bySize[sz]);
            if(isFinite(v) && v>=0) S.sgm[realGrp][realModel][sz]=v;
          });
        });
      });
    }
    if(data.tpr != null) S.pr.tekstil = data.tpr;
    if(data.alog) S.audit = toArr(data.alog);
    if(data.xmeta && typeof data.xmeta==='object'){
      S.xmeta={};
      Object.keys(data.xmeta).forEach(function(k){ S.xmeta[fbDec(k)] = data.xmeta[k]; });
    }
    if(data.xpr && typeof data.xpr==='object'){
      Object.keys(data.xpr).forEach(function(k){ S.pr[fbDec(k)] = data.xpr[k]; });
    }

    // Yatak reçeteleri (decode keys + array fix)
    if(data.yr && typeof data.yr === 'object' && Object.keys(data.yr).length > 0){
      S.yr = {};
      Object.keys(data.yr).forEach(function(k){
        var items = toArr(data.yr[k]);
        // Her item'ın q ve co'sunu da kontrol et (Firebase nested objeye çevirebilir)
        S.yr[fbDec(k)] = items.map(function(it){
          if(!it) return it;
          // q objesi korunmalı (key'ler "90x190" gibi, yasak karakter yok)
          return it;
        });
      });
      console.log('Yatak modelleri yüklendi:', Object.keys(S.yr).length);
    }
    // Başlık reçeteleri (decode keys + array fix)
    if(data.brr && typeof data.brr === 'object' && Object.keys(data.brr).length > 0){
      S.br = {};
      Object.keys(data.brr).forEach(function(k){
        S.br[fbDec(k)] = toArr(data.brr[k]);
      });
      console.log('Başlık modelleri yüklendi:', Object.keys(S.br).length);
    }
    // Baza reçeteleri (decode keys + array fix)
    if(data.bzrr && typeof data.bzrr === 'object' && Object.keys(data.bzrr).length > 0){
      S.bzr = {};
      Object.keys(data.bzrr).forEach(function(k){
        S.bzr[fbDec(k)] = toArr(data.bzrr[k]);
      });
      console.log('Baza modelleri yüklendi:', Object.keys(S.bzr).length);
    }
    // Kanepe reçeteleri (decode keys + array fix)
    if(data.krr && typeof data.krr === 'object' && Object.keys(data.krr).length > 0){
      S.kr = {};
      Object.keys(data.krr).forEach(function(k){
        S.kr[fbDec(k)] = toArr(data.krr[k]);
      });
      console.log('Kanepe modelleri yüklendi:', Object.keys(S.kr).length);
    }
    if(data.xgr && typeof data.xgr==='object'){
      S.xg={};
      Object.keys(data.xgr).forEach(function(g){
        var gk=fbDec(g);
        S.xg[gk]={};
        if(data.xgr[g] && typeof data.xgr[g]==='object'){
          Object.keys(data.xgr[g]).forEach(function(m){
            S.xg[gk][fbDec(m)] = toArr(data.xgr[g][m]);
          });
        }
      });
    }
    // Hammadde listesi (yeni eklenmiş materyaller + array fix)
    if(data.mats){
      var matsList = toArr(data.mats);
      if(matsList.length > 0){
        // Firebase'deki listeyi D.materials ile birleştir
        var existingNames = {};
        matsList.forEach(function(m){ if(m && m.p) existingNames[m.p]=true; });
        // D'de olup firebase'de olmayanları ekle

          }
        });
        D.materials = matsList;
        // mp'yi güncelle
        D.materials.forEach(function(m){
          if(S.mp[m.p] === undefined) S.mp[m.p] = m.pr;
        });
        console.log('Hammadde listesi yüklendi:', D.materials.length);
      }
    }

  return true;
}

// Akistan haber gelince tum veriyi yeniden cek ve uygula (sade ve guvenli)
function liveRefetch(){
  // Yerelde kaydedilmemis degisiklik VEYA aktif duzenleme varsa: sunucu verisini uygulama,
  // kullanicinin isini ezmeyelim. Biraz sonra tekrar dene.
  if(MANUAL_EDIT || SAVE_PENDING || isEditingNow()){
    clearTimeout(LIVE_DEBOUNCE);
    LIVE_DEBOUNCE = setTimeout(liveRefetch, 1500);

  }
  fbGet().then(function(data){

    // Yeniden kontrol: fetch donerken kullanici yazmaya baslamis olabilir
    if(MANUAL_EDIT || SAVE_PENDING || isEditingNow()){
      clearTimeout(LIVE_DEBOUNCE);
      LIVE_DEBOUNCE = setTimeout(liveRefetch, 1500);

    saveLocalBackup({S:S,materials:D.materials,at:new Date().toISOString()});

  }).catch(function(e){ console.warn('liveRefetch hata', e); });
}

function onStreamEvent(){
  clearTimeout(LIVE_DEBOUNCE);
  LIVE_DEBOUNCE = setTimeout(liveRefetch, 400); // patlama halinde olaylari birlestir
}

function startLiveSync(){
  if(typeof EventSource==='undefined'){ console.warn('EventSource yok, canli sync kapali'); return; }
  try{ if(FB_STREAM) FB_STREAM.close(); }catch(e){}
  var url = FB_URL + '.json' + (FB_ID_TOKEN ? ('?auth='+encodeURIComponent(FB_ID_TOKEN)) : '');
  var es;
  try{ es = new EventSource(url); }catch(e){ console.warn('EventSource acilamadi', e); return; }
  FB_STREAM = es;
  es.addEventListener('put', onStreamEvent);
  es.addEventListener('patch', onStreamEvent);
  es.onopen = function(){ setSyncStatus('\ud83d\udfe2 Canli baglandi','ok'); };
  es.onerror = function(){
    // Baglanti koptu (cogu zaman token suresi doldu). Token yenile + yeniden baglan.
    try{ es.close(); }catch(e){}
    FB_STREAM = null;
    setSyncStatus('Canli baglanti yenileniyor...','saving');
    refreshIdToken().then(function(){ setTimeout(startLiveSync, 1000); })
                    .catch(function(){ setTimeout(startLiveSync, 5000); });
  };
  // Token suresi ~1 saat: 50 dakikada bir proaktif yenile + yeniden baglan
  clearTimeout(LIVE_REFRESH_TIMER);
  LIVE_REFRESH_TIMER = setTimeout(function(){
    refreshIdToken().then(function(){ startLiveSync(); }).catch(function(){ startLiveSync(); });
  }, 50*60*1000);
}

// Firebase key encoder/decoder — Firebase key'lerde . $ # [ ] / yasak
function fbEnc(k){ return String(k).replace(/[.#$/\[\]]/g, function(c){ return '_' + c.charCodeAt(0).toString(16) + '_'; }); }
function fbDec(k){ return String(k).replace(/_([0-9a-f]{2})_/gi, function(m, hex){ return String.fromCharCode(parseInt(hex, 16)); }); }

// Firebase'e kaydet
function saveToFirebase(){
  if(!FB_READY || SAVE_PENDING) return;
  SAVE_PENDING = true;
  toast('💾 Kaydediliyor...', 'saving', 60000);
  setSyncStatus('Buluta yazılıyor...','saving');

  // 1) Veri doğrulama: hatalı reçete/fiyat kaydı engellensin
  try{
    validateState();
  }catch(ve){
    SAVE_PENDING = false;
    var vmsg = (ve && ve.message ? ve.message : String(ve||'Bilinmeyen doğrulama hatası'));
    setSyncStatus('Doğrulama hatası: '+vmsg.substring(0,90),'err');
    toast('⚠️ '+vmsg, 'err', 8000);
    MANUAL_EDIT = false;
    return;
  }

  // 2) Fiyat eşiği: kullanıcıdan onay iste
  if(MANUAL_EDIT && !BEFORE_UNLOAD){
    var ok = checkPriceWarning();
    if(!ok){
      SAVE_PENDING = false;
      setSyncStatus('Kaydetme iptal edildi','err');
      toast('Kaydetme iptal edildi', 'err', 3500);
      MANUAL_EDIT = false;
      return;
    }
  }

  // Firebase kuralları: boş string key yasak, null/undefined/NaN yasak, _ ile başlayan key yasak
  function safeN(v){ var n=parseFloat(v); return isFinite(n)?n:0; }
  function validKey(k){ return k && k.trim()!=='' && k.charAt(0)!=='.'; }

  // Model kar oranları
  var mprClean = {};
  Object.keys(S.mpr||{}).forEach(function(k){
    if(!validKey(k)) return;
    if(S.mpr[k]!==undefined && S.mpr[k]!==null) mprClean[fbEnc(k)] = safeN(S.mpr[k]);
  });

  // Işçilik - _default ve _ ile başlayan keyler çıkar
  var iscClean = {};
  Object.keys(S.isc||{}).forEach(function(grp){
    if(!validKey(grp) || grp.charAt(0)==='_') return;
    var src = S.isc[grp];
    if(!src || typeof src !== 'object') return;
    var g = {};
    Object.keys(src).forEach(function(k){
      if(!validKey(k) || k.charAt(0)==='_') return;
      g[fbEnc(k)] = safeN(src[k]);
    });
    if(Object.keys(g).length > 0) iscClean[fbEnc(grp)] = g;
  });

  // Tekstil reçeteleri
  var trClean = {};
  Object.keys(S.tr||{}).forEach(function(modelKey){
    if(!validKey(modelKey)) return;
    var items = S.tr[modelKey];
    if(!Array.isArray(items)) return;
    trClean[fbEnc(modelKey)] = items.filter(function(it){ return it && validKey(it.p); });
  });
  var trMetaClean = {};
  Object.keys(S.trMeta||{}).forEach(function(modelKey){
    if(!validKey(modelKey)) return;
    var tm=S.trMeta[modelKey]||{};
    trMetaClean[fbEnc(modelKey)]={type:tTypeKey(tm.type)};
  });
  var tgmClean = {};
  Object.keys(S.tgm||{}).forEach(function(modelKey){
    if(!validKey(modelKey)) return;
    var v=parseFloat(S.tgm[modelKey]);
    if(isFinite(v) && v>=0) tgmClean[fbEnc(modelKey)]=v;
  });
  var kgmClean = {};
  Object.keys(S.kgm||{}).forEach(function(modelKey){
    if(!validKey(modelKey)) return;
    var v=parseFloat(S.kgm[modelKey]);
    if(isFinite(v) && v>=0) kgmClean[fbEnc(modelKey)]=v;
  });
  var sgmClean = {};
  Object.keys(S.sgm||{}).forEach(function(grp){
    if(!validKey(grp)) return;
    var gmByModel=S.sgm[grp]||{};
    var go={};
    Object.keys(gmByModel).forEach(function(modelKey){
      if(!validKey(modelKey)) return;
      var bySize=gmByModel[modelKey]||{};
      var so={};
      Object.keys(bySize).forEach(function(sz){
        var v=parseFloat(bySize[sz]);
        if(isFinite(v) && v>=0) so[sz]=v;
      });
      if(Object.keys(so).length) go[fbEnc(modelKey)]=so;
    });
    if(Object.keys(go).length) sgmClean[fbEnc(grp)]=go;
  });

  // Tüm hammadde fiyatları — ARRAY olarak kaydet (key'lerde / # . vb. yasak)
  var mpArr = [];
  D.materials.forEach(function(m){
    if(!m.p || !m.p.trim()) return;
    mpArr.push({p: m.p, v: safeN(S.mp[m.p] !== undefined ? S.mp[m.p] : m.pr)});
  });
  Object.keys(S.mp||{}).forEach(function(k){
    if(!k || !k.trim()) return;
    var exists = mpArr.some(function(x){ return x.p===k; });
    if(!exists) mpArr.push({p: k, v: safeN(S.mp[k])});
  });

  // Yeni eklenen hammaddeler (D'de olmayan)
  var newMats = [];
  D.materials.forEach(function(m){
    // Sadece orijinal D listesindeki materyalleri kaydet
    newMats.push({p:m.p, pr:safeN(m.pr), u:m.u||'', c:m.c||'', a:m.a||''});
  });

  // Yatak/Başlık/Baza reçeteleri (tam kaydet)
  function cleanSizedRecipes(recs){
    if(!recs) return {};
    var out={};
    Object.keys(recs).forEach(function(model){
      if(!validKey(model)) return;
      var items=recs[model];
      if(!Array.isArray(items)) return;
      out[fbEnc(model)]=items.map(function(it){
        var ci={p:it.p||'',u:it.u||'',up:safeN(it.up),c:it.c||''};
        if(it.q && typeof it.q==='object'){ci.q={};Object.keys(it.q).forEach(function(sz){ci.q[sz]=safeN(it.q[sz])});}
        if(it.co && typeof it.co==='object'){ci.co={};Object.keys(it.co).forEach(function(sz){ci.co[sz]=safeN(it.co[sz])});}
        return ci;
      });
    });
    return out;
  }

  // Kanepe reçeteleri (tam kaydet)
  function cleanKRecipes(recs){
    if(!recs) return {};
    var out={};
    Object.keys(recs).forEach(function(model){
      if(!validKey(model)) return;
      var items=recs[model];
      if(!Array.isArray(items)) return;
      out[fbEnc(model)]=items.map(function(it){
        return {p:it.p||'',up:safeN(it.up),qty:safeN(it.qty),co:safeN(it.co)};
      });
    });
    return out;
  }

  // Özel ana gruplar
  var xgrClean={};
  Object.keys(S.xg||{}).forEach(function(grp){
    if(!validKey(grp)) return;
    xgrClean[fbEnc(grp)] = cleanSizedRecipes(S.xg[grp]);
  });
  var xprClean={};
  Object.keys(S.xg||{}).forEach(function(grp){
    if(!validKey(grp)) return;
    xprClean[fbEnc(grp)] = safeN(S.pr[grp]||20);
  });
  var xmetaClean={};
  Object.keys(S.xmeta||{}).forEach(function(grp){
    if(!validKey(grp)) return;
    var m=S.xmeta[grp]||{};
    xmetaClean[fbEnc(grp)]={name:cleanName(m.name||grp),icon:cleanName(m.icon||'🧩')};
  });
  var auditLog = Array.isArray(S.audit) ? S.audit.slice(-199) : [];
  var auditEntry = buildAuditEntry();
  if(auditEntry) auditLog.push(auditEntry);
  S.audit = auditLog;

  var payload = {
    mp:  mpArr,
    pr:  { yatak:safeN(S.pr.yatak), baslik:safeN(S.pr.baslik), baza:safeN(S.pr.baza), kanepe:safeN(S.pr.kanepe), tekstil:safeN(S.pr.tekstil) },
    mpr: mprClean,
    kdv: safeN(S.kdv),
    oh:  { gu:safeN(S.oh.gu), an:safeN(S.oh.an), fn:safeN(S.oh.fn), am:safeN(S.oh.am), sn:safeN(S.oh.sn), fr:safeN(S.oh.fr) },
    koh: { gu:safeN(S.koh.gu), an:safeN(S.koh.an), fn:safeN(S.koh.fn), am:safeN(S.koh.am), sn:safeN(S.koh.sn), fr:safeN(S.koh.fr), isSabit:safeN(S.koh.is_sabit) },
    isc: iscClean,
    tr:  trClean,
    trm: trMetaClean,
    tgm: tgmClean,
    kgm: kgmClean,
    sgm: sgmClean,
    xgr: xgrClean,
    xpr: xprClean,
    xmeta: xmetaClean,
    alog: auditLog,
    yr:  cleanSizedRecipes(S.yr),
    brr: cleanSizedRecipes(S.br),
    bzrr:cleanSizedRecipes(S.bzr),
    krr: cleanKRecipes(S.kr),
    mats:newMats,
    at:  new Date().toISOString()
  };

  var bodyStr;
  try {
    bodyStr = JSON.stringify(payload);
    console.log('Firebase kayıt boyutu:', (bodyStr.length/1024).toFixed(1)+'KB, key sayıları — yr:'+Object.keys(payload.yr||{}).length+' brr:'+Object.keys(payload.brr||{}).length+' bzrr:'+Object.keys(payload.bzrr||{}).length+' krr:'+Object.keys(payload.krr||{}).length+' mp:'+((payload.mp||[]).length)+' mats:'+((payload.mats||[]).length)+' tr:'+Object.keys(payload.tr||{}).length);
  } catch(je){
    SAVE_PENDING = false;
    toast('\u274C JSON hatası: '+je.message, 'err', 5000);
    console.error('JSON stringify hatası:', je);
    return;
  }

  // Firebase key doğrulama — yasak karakterleri bul ve düzelt
  function sanitizeKeys(obj, path){
    if(obj===null || obj===undefined || typeof obj!=='object') return obj;
    if(Array.isArray(obj)) return obj.map(function(item,i){return sanitizeKeys(item, path+'['+i+']');});
    var out={};
    Object.keys(obj).forEach(function(k){
      var bad=/[.#$/\[\]]/.test(k);
      var empty=!k || k.trim()==='';
      if(empty){
        console.warn('Firebase: boş key atlandı, path='+path);
        return;
      }
      var safeKey=bad?fbEnc(k):k;
      if(bad) console.warn('Firebase: yasak key düzeltildi: "'+k+'" → "'+safeKey+'" path='+path);
      out[safeKey]=sanitizeKeys(obj[k], path+'.'+safeKey);
    });
    return out;
  }
  var safePayload=sanitizeKeys(payload,'root');
  bodyStr=JSON.stringify(safePayload);
  saveLocalBackup({S:S,materials:D.materials,at:new Date().toISOString()});

  if(bodyStr===LAST_SAVED_HASH){
    SAVE_PENDING = false;
    return;
  }
  var pendingHash = bodyStr;

  fetch(FB_URL + '.json' + fbAuthQuery(), {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: bodyStr
  }).then(function(r){
    SAVE_PENDING = false;
    if(r.ok){
      LAST_SAVED_HASH = pendingHash;
      FB_WRITE_OK = true;
      LAST_MP_VALUES = snapshotMP();
      MANUAL_EDIT = false;
      saveLocalRevision('save-ok');
      setSyncStatus('✅ Buluta kaydedildi ('+(new Date()).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})+')','ok');
      toast('\u2705 Kaydedildi', 'ok', 2500);
    } else {
      r.text().then(function(t){
        FB_WRITE_OK = false;
        MANUAL_EDIT = false;
        setSyncStatus('Firebase hatası — yerelde kaldı','err');
        toast('\u274C Firebase: '+t.substring(0,120), 'err', 8000);
        console.error('Firebase PATCH error', r.status, t);
      });
    }
  }).catch(function(e){
    SAVE_PENDING = false;
    FB_WRITE_OK = false;
    MANUAL_EDIT = false;
    setSyncStatus('Ağ hatası — yerelde kaldı','err');
    toast('\u274C Ag hatasi: '+e.message, 'err', 5000);
  });
}

// Debounced otomatik kayıt — son değişiklikten 2 saniye sonra
function autoSave(){
  clearTimeout(AUTO_SAVE_TIMER);
  AUTO_SAVE_TIMER = setTimeout(saveToFirebase, 2000);
}

// Tüm input değişikliklerini dinle
document.addEventListener('change', function(e){
  var t = e.target;
  // Fiyat inputları, select'ler (kâr oranı, KDV vs.) değişince kaydet
  if(t.classList.contains('pi') || t.classList.contains('fs') || t.classList.contains('si')){
    MANUAL_EDIT = true;
    setSyncStatus('Değişiklik işlendi, kaydediliyor...','saving');
    saveLocalBackup({S:S,materials:D.materials,at:new Date().toISOString()});
    if(!FB_READY) return;
    autoSave();
  }
});
document.addEventListener('input', function(e){
  var t=e.target;
  if(t.classList.contains('pi') || t.classList.contains('si')){
    // Blur beklemeden yenilemede veri kaybını önler
    MANUAL_EDIT = true;
    setSyncStatus('Değişiklik işlendi...','saving');
    saveLocalBackup({S:S,materials:D.materials,at:new Date().toISOString()});
  }
});

// Periyodik kayıt — 60 saniyede bir (ekstra güvenlik)
setInterval(function(){ if(FB_READY) saveToFirebase(); }, 60000);

// Sayfa kapanırken kaydet
window.addEventListener('beforeunload', function(){
  BEFORE_UNLOAD = true;
  saveLocalBackup({S:S,materials:D.materials,at:new Date().toISOString()});
  if(AUTO_SAVE_TIMER) clearTimeout(AUTO_SAVE_TIMER);
  if(FB_READY) saveToFirebase();
});

);
